<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairyValue 🧚 - Original</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff85a2; --accent: #f72585; --bg-rose: #ffe5ec; --slot-border: #ffb3c1;
            --legendary: #ffac33; --ultra: #ff66cc; --rare: #33ccff; --uncommon: #66ff66; --common: #b3b3b3;
        }
        body, html { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; min-height: 100vh; background: #fff5f7; }
        
        #home-page {
            height: 100vh; background: linear-gradient(rgba(255, 133, 162, 0.4), rgba(0,0,0,0.6)), url('https://wallpapers.com/images/hd/adopt-me-background-r2fa0g7qap0177br.jpg');
            background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white;
        }
        .hero-title { font-size: 4rem; font-weight: 900; text-shadow: 0 5px 20px rgba(0,0,0,0.4); margin: 0; }
        .btn-container { display: flex; gap: 20px; margin-top: 30px; }
        .glass-btn { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 2px solid white; padding: 18px 40px; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        .section { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .elve-container { background: white; border-radius: 30px; padding: 20px; max-width: 500px; margin: 0 auto 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .elve-bar { height: 14px; background: #f0f0f0; border-radius: 10px; margin: 15px 0; overflow: hidden; display: flex; }
        #fill { height: 100%; width: 50%; background: linear-gradient(to right, #ff944d, #ff5e5e); transition: 0.5s; }

        .trade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: var(--bg-rose); padding: 15px; border-radius: 25px; }
        .slot { width: 80px; height: 80px; background: white; border: 2px solid var(--slot-border); border-radius: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .slot img { width: 80%; height: 80%; object-fit: contain; }
        .slot-label { position: absolute; bottom: 2px; right: 4px; font-size: 0.6rem; font-weight: 900; color: white; background: var(--accent); padding: 1px 4px; border-radius: 4px; }

        #picker { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; width:90%; max-width: 500px; height:80vh; z-index:2000; border-radius:30px; padding:20px; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,0.2); }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1999; }
        .modifier-row { display: flex; justify-content: space-around; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 15px; }
        .mod-btn { cursor: pointer; padding: 5px 15px; border-radius: 10px; border: 1px solid #ddd; }
        .mod-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }
        .pet-option { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .pet-option img { width: 50px; height: 50px; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="home-page">
        <h1 class="hero-title">FAIRYVALUE 🧚</h1>
        <div class="btn-container">
            <button class="glass-btn" onclick="showPage('list-page')">VALUE LIST</button>
            <button class="glass-btn" onclick="showPage('calc-page')">CALCULATOR</button>
        </div>
    </div>

    <div id="calc-page" class="section">
        <button onclick="showPage('home-page')" style="border:none; background:none; color:var(--accent); font-weight:bold; cursor:pointer;">← RETOUR</button>
        <div class="elve-container">
            <div style="display:flex; justify-content:space-between; font-size:2rem; font-weight:bold;">
                <span id="v-you">0</span> <span id="v-them" style="color:var(--accent)">0</span>
            </div>
            <div class="elve-bar"><div id="fill"></div></div>
        </div>
        <div style="display:flex; justify-content:center; gap:15px; flex-wrap:wrap;">
            <div class="trade-grid" id="grid-you"></div>
            <div class="trade-grid" id="grid-them"></div>
        </div>
    </div>

    <div id="list-page" class="section">
        <button onclick="showPage('home-page')" style="border:none; background:none; color:var(--accent); font-weight:bold; cursor:pointer;">← RETOUR</button>
        <div id="full-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap:10px; margin-top:20px;"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closePicker()"></div>
    <div id="picker">
        <div class="modifier-row">
            <div class="mod-btn" id="m-normal" onclick="setMod('normal')">Normal</div>
            <div class="mod-btn" id="m-neon" onclick="setMod('neon')">Neon</div>
            <div class="mod-btn" id="m-mega" onclick="setMod('mega')">Mega</div>
        </div>
        <div class="modifier-row">
            <label><input type="checkbox" id="fly"> Fly</label>
            <label><input type="checkbox" id="ride"> Ride</label>
        </div>
        <div id="pet-options"></div>
    </div>

    <script>
        const pets = [
            { n: "Shadow Dragon", v: 1000, i: "https://www.adoptmevaluelist.com/assets/images/pets/shadow_dragon.png" },
            { n: "Bat Dragon", v: 865, i: "https://www.adoptmevaluelist.com/assets/images/pets/bat_dragon.png" },
            { n: "Frost Dragon", v: 415, i: "https://www.adoptmevaluelist.com/assets/images/pets/frost_dragon.png" },
            { n: "Arctic Reindeer", v: 45, i: "https://www.adoptmevaluelist.com/assets/images/pets/arctic_reindeer.png" },
            { n: "Owl", v: 265, i: "https://www.adoptmevaluelist.com/assets/images/pets/owl.png" },
            { n: "Cow", v: 16, i: "https://www.adoptmevaluelist.com/assets/images/pets/cow.png" },
            { n: "Giant Panda", v: 3.5, i: "https://www.adoptmevaluelist.com/assets/images/pets/giant_panda.png" },
            { n: "Unicorn", v: 2.5, i: "https://www.adoptmevaluelist.com/assets/images/pets/unicorn.png" },
            { n: "Turtle", v: 21, i: "https://www.adoptmevaluelist.com/assets/images/pets/turtle.png" },
            { n: "Kangaroo", v: 18.5, i: "https://www.adoptmevaluelist.com/assets/images/pets/kangaroo.png" }
        ];

        let curSide = 'you', curSlot = 0, curMod = 'normal';
        let dataYou = Array(9).fill(0), dataThem = Array(9).fill(0);

        function showPage(id) {
            document.getElementById('home-page').style.display = (id === 'home-page') ? 'flex' : 'none';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'list-page') renderValueList();
        }

        function setMod(m) {
            curMod = m;
            document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('m-'+m).classList.add('selected');
        }

        function openPicker(side, slot) {
            curSide = side; curSlot = slot;
            document.getElementById('picker').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            renderOptions();
        }

        function renderOptions() {
            const opt = document.getElementById('pet-options');
            opt.innerHTML = "";
            pets.forEach(p => {
                opt.innerHTML += `<div class="pet-option" onclick="selectPet('${p.n}', ${p.v}, '${p.i}')">
                    <img src="${p.i}">
                    <div style="flex:1"><b>${p.n}</b></div>
                    <b>${p.v}</b>
                </div>`;
            });
        }

        function selectPet(name, val, img) {
            let fVal = val; let label = "";
            if(curMod === 'neon') { fVal *= 4; label = "N"; }
            if(curMod === 'mega') { fVal *= 16; label = "M"; }
            if(document.getElementById('fly').checked) { fVal += 1; label += "F"; }
            if(document.getElementById('ride').checked) { fVal += 0.5; label += "R"; }
            
            const id = curSide === 'you' ? `sy-${curSlot}` : `st-${curSlot}`;
            document.getElementById(id).innerHTML = `<img src="${img}"><div class="slot-label">${label || 'Reg'}</div>`;
            if(curSide === 'you') dataYou[curSlot] = fVal; else dataThem[curSlot] = fVal;
            updateBar(); closePicker();
        }

        function updateBar() {
            const sY = dataYou.reduce((a,b)=>a+b,0), sT = dataThem.reduce((a,b)=>a+b,0);
            document.getElementById('v-you').innerText = sY.toFixed(1);
            document.getElementById('v-them').innerText = sT.toFixed(1);
            const total = sY + sT;
            document.getElementById('fill').style.width = total === 0 ? "50%" : (sY / total * 100) + "%";
        }

        function renderValueList() {
            const container = document.getElementById('full-list');
            container.innerHTML = "";
            pets.forEach(p => {
                container.innerHTML += `<div style="background:white; padding:10px; border-radius:15px; text-align:center;">
                    <img src="${p.i}" style="width:60px;"><br>
                    <b>${p.n}</b><br><span>${p.v}</span>
                </div>`;
            });
        }

        function closePicker() { document.getElementById('picker').style.display='none'; document.getElementById('overlay').style.display='none'; }
        
        window.onload = () => {
            const gy = document.getElementById('grid-you'), gt = document.getElementById('grid-them');
            for(let i=0; i<9; i++) {
                gy.innerHTML += `<div class="slot" onclick="openPicker('you', ${i})" id="sy-${i}">+</div>`;
                gt.innerHTML += `<div class="slot" onclick="openPicker('them', ${i})" id="st-${i}">+</div>`;
            }
        }
    </script>
</body>
</html>
