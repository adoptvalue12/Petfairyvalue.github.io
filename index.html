<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairyValue 🧚 - Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff85a2; --accent: #f72585; --bg-rose: #ffe5ec;
            --legendary: linear-gradient(135deg, #ffcc33 0%, #ffab1a 100%);
            --ultra: linear-gradient(135deg, #ff85e1 0%, #f72585 100%);
            --rare: linear-gradient(135deg, #4cc9f0 0%, #4361ee 100%);
            --item: linear-gradient(135deg, #b79ced 0%, #7209b7 100%);
        }
        body, html { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; background: #fff5f7; color: #333; overflow-x: hidden; }
        #home-page { height: 100vh; background: linear-gradient(rgba(255,133,162,0.3), rgba(0,0,0,0.7)), url('https://wallpapers.com/images/hd/adopt-me-background-r2fa0g7qap0177br.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hero-title { font-size: clamp(2.5rem, 10vw, 5rem); font-weight: 900; color: white; text-shadow: 0 0 20px var(--accent); margin: 0; }
        .glass-btn { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 2px solid white; padding: 15px 30px; border-radius: 50px; color: white; font-weight: 900; cursor: pointer; margin: 10px; text-transform: uppercase; transition: 0.3s; }
        .glass-btn:hover { background: rgba(255,255,255,0.4); }
        .section { display: none; padding: 20px; animation: slideUp 0.3s ease; }
        .active { display: block; }
        .elve-container { background: white; border-radius: 30px; padding: 20px; max-width: 600px; margin: 0 auto 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .trade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #fff; padding: 10px; border-radius: 20px; border: 3px solid var(--bg-rose); }
        .slot { width: 90px; height: 90px; background: #fdfdfd; border: 2px dashed #eee; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .slot img { width: 80%; height: 80%; object-fit: contain; }
        .remove-btn { position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; border: 2px solid white; z-index: 5; }
        .slot-tag { position: absolute; bottom: 2px; right: 2px; font-size: 0.6rem; background: #333; color: white; padding: 1px 4px; border-radius: 4px; font-weight: 900; }
        #picker { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; width:95%; max-width: 500px; height:85vh; z-index:3000; border-radius:30px; padding:20px; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.3); }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2999; }
        .mode-row { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .m-btn { flex: 1; min-width: 60px; padding: 8px; border-radius: 10px; border: 1px solid #ddd; font-weight: 900; cursor: pointer; font-size: 0.7rem; }
        .m-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        #pet-options { flex: 1; overflow-y: auto; }
        .pet-choice { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="home-page">
        <h1 class="hero-title">FAIRYVALUE 🧚</h1>
        <div>
            <button class="glass-btn" onclick="showPage('list-page')">Value List 📈</button>
            <button class="glass-btn" onclick="showPage('calc-page')">Trades ✨</button>
        </div>
    </div>

    <div id="calc-page" class="section">
        <button onclick="showPage('home-page')" style="border:none; background:none; color:var(--accent); font-weight:900; cursor:pointer; margin-bottom: 10px;">← MENU</button>
        <div class="elve-container">
            <div style="display:flex; justify-content:space-around; align-items:center;">
                <div><small>YOU</small><div id="v-you" style="font-size:2rem; font-weight:900;">0</div></div>
                <div id="profit-text" style="font-weight:900; color:#ccc;">VS</div>
                <div><small>THEM</small><div id="v-them" style="font-size:2rem; font-weight:900; color:var(--accent);">0</div></div>
            </div>
        </div>
        <div style="display:flex; justify-content:center; gap:15px; flex-wrap:wrap;">
            <div><h4 style="text-align:center; margin:5px;">YOU</h4><div id="grid-you" class="trade-grid"></div></div>
            <div><h4 style="text-align:center; margin:5px;">THEM</h4><div id="grid-them" class="trade-grid"></div></div>
        </div>
    </div>

    <div id="list-page" class="section">
        <button onclick="showPage('home-page')" style="border:none; background:none; color:var(--accent); font-weight:900; cursor:pointer;">← MENU</button>
        <h2 style="text-align:center">TRENDS & VALUES</h2>
        <div id="full-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap:10px;"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closePicker()"></div>
    <div id="picker">
        <div class="mode-row">
            <button class="m-btn active" onclick="setM('reg', this)">REG</button>
            <button class="m-btn" onclick="setM('neon', this)">NEON</button>
            <button class="m-btn" onclick="setM('mega', this)">MEGA</button>
            <button class="m-btn" id="r-btn" onclick="toggleRF('R')">R</button>
            <button class="m-btn" id="f-btn" onclick="toggleRF('F')">F</button>
        </div>
        <input type="text" id="search" placeholder="Search pet..." onkeyup="filterPets()" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px; box-sizing: border-box;">
        <div id="pet-options"></div>
    </div>

    <script>
        const pets = [
            // HIGH TIERS
            { n: "Bat Dragon", v: 630, old: 625, r: "legendary" }, 
            { n: "Shadow Dragon", v: 550, old: 560, r: "legendary" },
            { n: "Giraffe", v: 220, old: 220, r: "legendary" }, 
            { n: "Frost Dragon", v: 195, old: 190, r: "legendary" },
            { n: "Owl", v: 165, old: 155, r: "legendary" }, 
            { n: "Parrot", v: 135, old: 135, r: "legendary" },
            { n: "Evil Unicorn", v: 99, old: 98, r: "legendary" }, 
            { n: "Crow", v: 90, old: 90, r: "legendary" },
            
            // EXOTICS & MID TIERS
            { n: "Balloon Unicorn", v: 75, old: 80, r: "legendary" }, 
            { n: "Cryptid", v: 67, old: 60, r: "legendary" },
            { n: "Diamond Butterfly", v: 55, old: 80, r: "legendary" }, 
            { n: "Dalmatian", v: 45, old: 42, r: "ultra" },
            { n: "Hedgehog", v: 39.5, old: 38, r: "ultra" }, 
            { n: "African Wild Dog", v: 70, old: 22, r: "ultra" },
            { n: "Turtle", v: 26, old: 22, r: "legendary" }, 
            { n: "Kangaroo", v: 22, old: 28, r: "legendary" },
            { n: "Cow", v: 26.5, old: 15, r: "rare" }, 
            { n: "Elephant", v: 16, old: 12, r: "rare" },
            { n: "Blue Dog", v: 28, old: 25, r: "uncommon" }, 
            { n: "Pink Cat", v: 15, old: 12, r: "uncommon" },
            
            // SEARCHED / NEW
            { n: "Caterpillar", v: 7, old: 4.5, r: "ultra" }, 
            { n: "Puffin", v: 6, old: 5, r: "ultra" },
            { n: "Jellyfish", v: 4.5, old: 3, r: "ultra" }, 
            { n: "Peppermint Penguin", v: 23.5, old: 3.5, r: "ultra" },
            { n: "Midnight Dragon", v: 6, old: 7, r: "legendary" }, 
            { n: "Mechapup", v: 9.5, old: 8.5, r: "legendary" },
            { n: "Nessie", v: 4, old: 3.5, r: "legendary" }, 
            { n: "Tortuga de la Isla", v: 15.5, old: 5, r: "legendary" },
            { n: "Vampire Dragon", v: 6.5, old: 4.5, r: "legendary" }, 
            { n: "Lavender Dragon", v: 4.5, old: 3, r: "legendary" },
            { n: "Ghost Dragon", v: 5.5, old: 3.5, r: "legendary" }, 
            { n: "Squid", v: 1.5, old: 1, r: "legendary" },
            { n: "Many Pelled Dog", v: 1.5, old: 1, r: "legendary" }, 
            { n: "Glacier Moth", v: 3.5, old: 3, r: "legendary" },
            { n: "Sugar Glider", v: 3.5, old: 3, r: "legendary" }, 
            { n: "Dancing Dragon", v: 3, old: 3, r: "legendary" },
            
            // TOYS & ITEMS
            { n: "Tombstone", v: 60, old: 50, r: "item" }, 
            { n: "Candy Cannon", v: 135, old: 400, r: "item" },
            { n: "Ride Potion", v: 2, old: 1.5, r: "item" }, 
            { n: "Fly Potion", v: 3, old: 2.5, r: "item" },
            { n: "Safari Egg", v: 115, old: 110, r: "item" }, 
            { n: "Jungle Egg", v: 65, old: 65, r: "item" },
            { n: "Farm Egg", v: 35, old: 20, r: "item" }, 
            { n: "Christmas Egg", v: 35, old: 3, r: "item" }
        ];

        let curSide, curSlot, curM = 'reg', curR = false, curF = false;
        let dYou = Array(9).fill(0), dThem = Array(9).fill(0);

        function showPage(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('home-page').style.display = (id === 'home-page' ? 'flex' : 'none');
            document.getElementById(id).classList.add('active');
            if(id === 'list-page') renderList();
        }

        function setM(m, btn) {
            curM = m; 
            document.querySelectorAll('.m-btn').forEach(b => { if(!b.id.includes('-btn')) b.classList.remove('active') }); 
            btn.classList.add('active');
            renderOptions();
        }

        function toggleRF(type) {
            if(type === 'R') { curR = !curR; document.getElementById('r-btn').classList.toggle('active'); }
            if(type === 'F') { curF = !curF; document.getElementById('f-btn').classList.toggle('active'); }
        }

        function openPicker(side, slot) {
            curSide = side; curSlot = slot;
            document.getElementById('picker').style.display = 'flex';
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('search').value = "";
            renderOptions();
        }

        function renderOptions() {
            const container = document.getElementById('pet-options'); container.innerHTML = "";
            pets.forEach(p => {
                let val = p.v;
                if(p.r !== 'item') { 
                    if(curM === 'neon') val *= 4; 
                    if(curM === 'mega') val *= 16; 
                }
                const img = `https://adoptme.fandom.com/wiki/Special:FilePath/${p.n.replace(/ /g, "_")}.png?width=100`;
                container.innerHTML += `<div class="pet-choice" onclick="selectPet('${p.n}', ${val}, '${img}')">
                    <img src="${img}" style="width:35px;" onerror="this.src='https://via.placeholder.com/35'">
                    <span style="flex:1">${p.n}</span><b>${val.toFixed(1)}</b>
                </div>`;
            });
        }

        function selectPet(n, v, img) {
            const id = curSide === 'you' ? `sy-${curSlot}` : `st-${curSlot}`;
            let tag = curM.toUpperCase()[0];
            if(curR) tag += "R"; if(curF) tag += "F";
            document.getElementById(id).innerHTML = `<div class="remove-btn" onclick="removePet(event, '${curSide}', ${curSlot})">X</div><img src="${img}"><div class="slot-tag">${tag}</div>`;
            if(curSide === 'you') dYou[curSlot] = v; else dThem[curSlot] = v;
            updateValues(); closePicker();
        }

        function removePet(e, side, slot) {
            e.stopPropagation();
            const id = side === 'you' ? `sy-${slot}` : `st-${slot}`;
            document.getElementById(id).innerHTML = "+";
            if(side === 'you') dYou[slot] = 0; else dThem[slot] = 0;
            updateValues();
        }

        function updateValues() {
            const sY = dYou.reduce((a,b)=>a+b,0), sT = dThem.reduce((a,b)=>a+b,0);
            document.getElementById('v-you').innerText = sY.toFixed(1);
            document.getElementById('v-them').innerText = sT.toFixed(1);
            const p = document.getElementById('profit-text');
            if(sY === 0 && sT === 0) { p.innerText = "VS"; p.style.color = "#ccc"; }
            else if(sT > sY * 1.05) { p.innerText = "WIN! 🤑"; p.style.color = "#48bb78"; confetti(); }
            else if(sT < sY * 0.95) { p.innerText = "LOSE! ❌"; p.style.color = "#f56565"; }
            else { p.innerText = "FAIR! 🤝"; p.style.color = "#ecc94b"; }
        }

        function renderList() {
            const cont = document.getElementById('full-list'); cont.innerHTML = "";
            const sortedPets = [...pets].sort((a,b) => b.v - a.v);
            sortedPets.forEach(p => {
                const tr = p.v > p.old ? `<span style="color:#38b2ac">▲</span>` : (p.v < p.old ? `<span style="color:#e53e3e">▼</span>` : "=");
                cont.innerHTML += `<div class="pet-card" style="background:white; padding:10px; border-radius:15px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.05);">
                    <img src="https://adoptme.fandom.com/wiki/Special:FilePath/${p.n.replace(/ /g, "_")}.png?width=100" style="width:50px;" onerror="this.src='https://via.placeholder.com/50'">
                    <div style="font-size:0.7rem; font-weight:900;">${p.n}</div>
                    <div style="color:var(--accent); font-weight:900;">${p.v.toFixed(1)} ${tr}</div>
                </div>`;
            });
        }

        function closePicker() { document.getElementById('picker').style.display='none'; document.getElementById('overlay').style.display='none'; }
        
        function filterPets() {
            const val = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.pet-choice').forEach(el => { 
                el.style.display = el.innerText.toLowerCase().includes(val) ? "flex" : "none"; 
            });
        }

        function init() {
            const gy = document.getElementById('grid-you'), gt = document.getElementById('grid-them');
            gy.innerHTML = ""; gt.innerHTML = "";
            for(let i=0; i<9; i++) {
                gy.innerHTML += `<div class="slot" id="sy-${i}" onclick="openPicker('you', ${i})">+</div>`;
                gt.innerHTML += `<div class="slot" id="st-${i}" onclick="openPicker('them', ${i})">+</div>`;
            }
        }
        init();
    </script>
</body>
</html>
