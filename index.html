<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FairyValue 🧚</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff85a2; --accent: #f72585; --bg-rose: #ffe5ec; --slot-border: #ffb3c1; }
        body, html { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; background: #fff5f7; }
        #home-page { height: 100vh; background: linear-gradient(rgba(255,133,162,0.4), rgba(0,0,0,0.6)), url('https://wallpapers.com/images/hd/adopt-me-background-r2fa0g7qap0177br.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .hero-title { font-size: 4rem; font-weight: 900; }
        .btn-container { display: flex; gap: 20px; margin-top: 30px; }
        .glass-btn { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 2px solid white; padding: 15px 35px; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .glass-btn:hover { background: white; color: var(--accent); }
        .section { display: none; padding: 20px; }
        .active { display: block; }
        .elve-container { background: white; border-radius: 30px; padding: 20px; max-width: 500px; margin: 0 auto 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .elve-bar { height: 14px; background: #f0f0f0; border-radius: 10px; margin: 15px 0; overflow: hidden; display: flex; }
        #fill { height: 100%; width: 50%; background: linear-gradient(to right, #ff944d, #ff5e5e); transition: 0.5s; }
        .trade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: var(--bg-rose); padding: 15px; border-radius: 25px; border: 4px solid var(--slot-border); }
        .slot { width: 80px; height: 80px; background: white; border: 2px solid var(--slot-border); border-radius: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .slot img { width: 80%; height: 80%; object-fit: contain; }
        #picker { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; width:90%; max-width: 500px; height:80vh; z-index:2000; border-radius:30px; padding:20px; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,0.2); }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1999; }
        .pet-option { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .pet-option img { width: 50px; height: 50px; margin-right: 10px; }
        #search { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="home-page" style="display: flex;">
        <h1 class="hero-title">FAIRYVALUE 🧚</h1>
        <div class="btn-container">
            <button class="glass-btn" onclick="showPage('list-page')">VALUE LIST</button>
            <button class="glass-btn" onclick="showPage('calc-page')">CALCULATOR</button>
        </div>
    </div>

    <div id="calc-page" class="section">
        <button onclick="showPage('home-page')" style="cursor:pointer; background:none; border:none; color:var(--accent); font-weight:bold;">← RETOUR</button>
        <div class="elve-container">
            <div style="display:flex; justify-content:space-between; font-size:2rem; font-weight:bold;">
                <span id="v-you">0</span> <span id="v-them" style="color:var(--accent)">0</span>
            </div>
            <div class="elve-bar"><div id="fill"></div></div>
        </div>
        <div style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap;">
            <div class="trade-grid" id="grid-you"></div>
            <div class="trade-grid" id="grid-them"></div>
        </div>
    </div>

    <div id="list-page" class="section">
        <button onclick="showPage('home-page')" style="cursor:pointer; background:none; border:none; color:var(--accent); font-weight:bold;">← RETOUR</button>
        <div id="full-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap:10px; margin-top:20px;"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closePicker()"></div>
    <div id="picker">
        <input type="text" id="search" placeholder="Rechercher un pet..." onkeyup="filterPets()">
        <div id="pet-options"></div>
    </div>

    <script>
        // ON REVIENT AUX NOMS DE FICHIERS PURS
        const pets = [
            { n: "Shadow Dragon", v: 1000, i: "shadow_dragon.png" },
            { n: "Bat Dragon", v: 865, i: "bat_dragon.png" },
            { n: "Frost Dragon", v: 415, i: "frost_dragon.png" },
            { n: "Giraffe", v: 520, i: "giraffe.png" },
            { n: "Owl", v: 265, i: "owl.png" },
            { n: "Parrot", v: 215, i: "parrot.png" },
            { n: "Evil Unicorn", v: 165, i: "evil_unicorn.png" },
            { n: "Crow", v: 155, i: "crow.png" },
            { n: "Arctic Reindeer", v: 45, i: "arctic_reindeer.png" },
            { n: "Cow", v: 16, i: "cow.png" },
            { n: "Turtle", v: 21, i: "turtle.png" },
            { n: "Kangaroo", v: 18.5, i: "kangaroo.png" },
            { n: "Giant Panda", v: 3.5, i: "giant_panda.png" },
            { n: "Unicorn", v: 2.5, i: "unicorn.png" },
            { n: "Albino Monkey", v: 24, i: "albino_monkey.png" },
            { n: "Blue Dog", v: 38, i: "blue_dog.png" },
            { n: "Pink Cat", v: 30, i: "pink_cat.png" }
        ];

        let curSide = 'you', curSlot = 0;
        let dataYou = Array(9).fill(0), dataThem = Array(9).fill(0);

        function showPage(id) {
            document.getElementById('home-page').style.display = 'none';
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            const target = document.getElementById(id);
            if (id === 'home-page') target.style.display = 'flex';
            else target.style.display = 'block';
            if(id === 'list-page') renderValueList();
        }

        function openPicker(side, slot) {
            curSide = side; curSlot = slot;
            document.getElementById('picker').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            renderOptions();
        }

        function renderOptions() {
            const opt = document.getElementById('pet-options');
            opt.innerHTML = "";
            pets.forEach(p => {
                opt.innerHTML += `<div class="pet-option" onclick="selectPet(${p.v}, '${p.i}')">
                    <img src="${p.i}" onerror="this.style.display='none'"> <b>${p.n}</b> <span style="margin-left:auto">${p.v}</span>
                </div>`;
            });
        }

        function selectPet(val, img) {
            const id = curSide === 'you' ? `sy-${curSlot}` : `st-${curSlot}`;
            document.getElementById(id).innerHTML = `<img src="${img}">`;
            if(curSide === 'you') dataYou[curSlot] = val; else dataThem[curSlot] = val;
            updateBar(); closePicker();
        }

        function updateBar() {
            const sY = dataYou.reduce((a,b)=>a+b,0), sT = dataThem.reduce((a,b)=>a+b,0);
            document.getElementById('v-you').innerText = sY;
            document.getElementById('v-them').innerText = sT;
            const total = sY + sT;
            document.getElementById('fill').style.width = total === 0 ? "50%" : (sY / total * 100) + "%";
        }

        function renderValueList() {
            const container = document.getElementById('full-list');
            container.innerHTML = "";
            pets.forEach(p => {
                container.innerHTML += `<div style="background:white; padding:10px; border-radius:15px; text-align:center;">
                    <img src="${p.i}" width="50"><br><b>${p.n}</b><br>${p.v}
                </div>`;
            });
        }

        function filterPets() {
            const s = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.pet-option').forEach(o => {
                o.style.display = o.innerText.toLowerCase().includes(s) ? "flex" : "none";
            });
        }

        function closePicker() { document.getElementById('picker').style.display='none'; document.getElementById('overlay').style.display='none'; }
        
        window.onload = () => {
            const gy = document.getElementById('grid-you'), gt = document.getElementById('grid-them');
            for(let i=0; i<9; i++) {
                gy.innerHTML += `<div class="slot" onclick="openPicker('you', ${i})" id="sy-${i}">+</div>`;
                gt.innerHTML += `<div class="slot" onclick="openPicker('them', ${i})" id="st-${i}">+</div>`;
            }
        }
    </script>
</body>
</html>
