<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FairyValue ✨ — Adopt Me Value List</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bubblegum+Sans&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" crossorigin="anonymous"></script>
<style>
:root{
  --bg:#fdf4ff;--surface:#fff;--surface2:#fdf0ff;
  --border:#edd6ff;--border2:#ffd6eb;
  --pink:#ff5fa0;--pink-l:#ffb3d8;--pink-pale:#fff0f8;
  --purple:#b06aff;--purple-l:#d9b3ff;--purple-pale:#f5edff;
  --gold:#f59e0b;--blue:#38bdf8;--green:#22d3a0;--red:#f43f5e;
  --text:#2a1a3e;--text2:#7a6090;--text3:#baafc8;--r:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.page{display:none;min-height:100vh}
.page.active{display:block;animation:fadeUp .3s ease}
#home-page.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;position:relative}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* HOME */
.home-bg{position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse 100% 70% at 50% -5%,rgba(200,120,255,.18),transparent),radial-gradient(ellipse 70% 50% at 85% 85%,rgba(255,95,160,.14),transparent),radial-gradient(ellipse 60% 45% at 5% 70%,rgba(100,170,255,.1),transparent),linear-gradient(160deg,#fdf4ff 0%,#fff5fb 50%,#f5eeff 100%)}
.deco-circle{position:absolute;border-radius:50%;opacity:.08;pointer-events:none;z-index:0}
.home-content{position:relative;z-index:2;text-align:center;padding:20px}
.home-brand{font-family:'Bubblegum Sans',cursive;font-size:clamp(4rem,15vw,8rem);line-height:.95;background:linear-gradient(135deg,#ff5fa0 0%,#b06aff 50%,#7b9fff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 4px 20px rgba(176,106,255,.3));animation:brandFloat 4s ease-in-out infinite;margin-bottom:6px}
@keyframes brandFloat{0%,100%{transform:translateY(0) rotate(-.5deg)}50%{transform:translateY(-14px) rotate(.5deg)}}
.home-adopt{font-size:clamp(.85rem,2.5vw,.95rem);font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--text2);margin-bottom:36px}
.home-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.hbtn{display:flex;align-items:center;gap:9px;padding:14px 30px;border-radius:100px;border:none;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:800;cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.hbtn-main{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;box-shadow:0 8px 24px rgba(176,106,255,.35)}
.hbtn-main:hover{transform:scale(1.06) translateY(-2px);box-shadow:0 14px 32px rgba(176,106,255,.45)}
.hbtn-alt{background:var(--surface);color:var(--purple);border:2px solid var(--border)}
.hbtn-alt:hover{transform:scale(1.04) translateY(-2px);background:var(--purple-pale);border-color:var(--purple-l)}
.home-pills{display:flex;gap:10px;margin-top:50px;flex-wrap:wrap;justify-content:center}
.hp{background:var(--surface);border:1.5px solid var(--border);padding:10px 20px;border-radius:100px;display:flex;align-items:center;gap:7px}
.hp-n{font-family:'Bubblegum Sans',cursive;font-size:1.2rem;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hp-l{font-size:.7rem;font-weight:800;letter-spacing:.5px;color:var(--text2);text-transform:uppercase}

/* NAV */
.nav{position:sticky;top:0;z-index:200;background:rgba(253,244,255,.9);backdrop-filter:blur(16px);border-bottom:1.5px solid var(--border);display:flex;align-items:center;padding:12px 18px;gap:10px}
.nav-logo{font-family:'Bubblegum Sans',cursive;font-size:1.3rem;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nbk{background:var(--surface2);border:1.5px solid var(--border);padding:7px 16px;border-radius:100px;color:var(--purple);font-weight:800;cursor:pointer;font-size:.8rem;font-family:'Nunito',sans-serif;transition:all .18s}
.nbk:hover{background:var(--purple);color:white;border-color:var(--purple)}
.nav-tabs{margin-left:auto;display:flex;gap:3px;background:var(--surface2);padding:4px;border-radius:100px;border:1.5px solid var(--border)}
.ntab{background:none;border:none;padding:7px 16px;border-radius:100px;color:var(--text2);font-weight:800;cursor:pointer;font-size:.8rem;font-family:'Nunito',sans-serif;transition:all .18s;white-space:nowrap}
.ntab.on{background:linear-gradient(135deg,var(--pink),var(--purple));color:white}
.content{padding:18px;max-width:980px;margin:0 auto}

/* CALC */
.calc-hero{
  background:linear-gradient(135deg,var(--surface),var(--purple-pale));
  border:1.5px solid var(--border);border-radius:var(--r);
  padding:20px;margin-bottom:18px;
  box-shadow:0 4px 20px rgba(176,106,255,.08);
}
.calc-row{display:flex;align-items:center;justify-content:space-around;gap:8px}
.calc-side{text-align:center;flex:1}
.clabel{font-size:.65rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.cvalue{font-family:'Bubblegum Sans',cursive;font-size:2.8rem;color:var(--text);line-height:1}
.csub{font-size:.62rem;font-weight:700;color:var(--text3);margin-top:2px}

/* Balance bar */
.balance-bar-wrap{margin-top:14px}
.balance-label{display:flex;justify-content:space-between;font-size:.6rem;font-weight:800;color:var(--text3);margin-bottom:4px}
.balance-bar{height:8px;background:var(--surface2);border-radius:100px;overflow:hidden;border:1px solid var(--border)}
.balance-fill{height:100%;border-radius:100px;transition:width .4s cubic-bezier(.4,0,.2,1),background .3s;background:linear-gradient(90deg,var(--pink),var(--purple))}

.verdict-wrap{display:flex;flex-direction:column;align-items:center;gap:7px}
.verdict{
  font-size:.88rem;font-weight:800;padding:9px 18px;border-radius:100px;
  background:var(--surface2);color:var(--text2);border:1.5px solid var(--border);
  transition:all .3s;white-space:nowrap;min-width:90px;text-align:center;
}
.verdict.win{background:rgba(34,211,160,.1);color:var(--green);border-color:rgba(34,211,160,.3)}
.verdict.lose{background:rgba(56,189,248,.08);color:var(--blue);border-color:rgba(56,189,248,.2)}
.verdict.fair{background:rgba(245,158,11,.08);color:var(--gold);border-color:rgba(245,158,11,.2)}
.clr-btn{background:none;border:1.5px solid var(--border2);padding:6px 14px;border-radius:100px;color:var(--text3);font-size:.73rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .18s}
.clr-btn:hover{border-color:var(--red);color:var(--red)}

/* Slot improvements */
.slot .sname{position:absolute;top:2px;left:0;right:0;font-size:.38rem;font-weight:900;text-align:center;color:rgba(255,255,255,.9);pointer-events:none;line-height:1.1;padding:0 2px;text-shadow:0 1px 4px rgba(0,0,0,.9)}
.slot.vip-slot{border-color:var(--gold) !important;border-width:2px !important;box-shadow:0 0 10px rgba(245,158,11,.3)}
.slot.vip-slot .sval{background:rgba(245,158,11,.9) !important;color:#1c0a00 !important}

/* GRIDS */
.grids-wrap{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.grid-box{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;flex:1;min-width:240px;max-width:370px;box-shadow:0 4px 16px rgba(176,106,255,.07)}
.gtitle{font-size:.65rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);text-align:center;margin-bottom:11px;display:flex;align-items:center;justify-content:center;gap:7px}
.gtitle .gv{font-family:'Bubblegum Sans',cursive;font-size:.95rem;color:var(--purple);background:var(--purple-pale);padding:2px 10px;border-radius:100px;border:1px solid var(--border)}
.trade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}

/* SLOTS */
.slot{aspect-ratio:1;background:var(--surface2);border:2px dashed var(--border2);border-radius:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:all .2s cubic-bezier(.4,0,.2,1)}
.slot:hover{border-color:var(--pink);background:var(--pink-pale);transform:scale(1.05)}
.slot.filled{border-style:solid;border-color:var(--border)}
.slot svg.plus{color:var(--border2);transition:color .2s}
.slot:hover svg.plus{color:var(--pink-l)}
.slot .pet-icon{width:68%;height:68%;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bubblegum Sans',cursive;font-size:.52rem;font-weight:700;text-align:center;line-height:1.2;color:white;padding:3px;pointer-events:none}
.slot .sval{position:absolute;bottom:3px;left:3px;font-size:.44rem;font-weight:800;background:rgba(255,255,255,.92);color:var(--purple);padding:2px 5px;border-radius:6px;pointer-events:none;border:1px solid var(--border)}
.slot .stag{position:absolute;bottom:3px;right:3px;font-size:.44rem;font-weight:800;background:var(--purple);color:white;padding:2px 5px;border-radius:6px;pointer-events:none}
.rm{position:absolute;top:-6px;right:-6px;background:var(--red);color:white;border-radius:50%;width:19px;height:19px;font-size:9px;font-weight:900;border:2px solid var(--bg);cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.rm:hover{transform:scale(1.3)}

/* PICKER */
.overlay{display:none;position:fixed;inset:0;background:rgba(42,26,62,.45);z-index:998;backdrop-filter:blur(6px)}
.picker{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:28px 28px 0 0;padding:16px 16px 32px;z-index:999;max-height:88vh;flex-direction:column;border-top:1.5px solid var(--border);box-shadow:0 -20px 50px rgba(176,106,255,.15)}
.p-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;flex-shrink:0}
.mod-row{display:flex;gap:5px;margin-bottom:9px;flex-shrink:0}
.mbtn{flex:1;padding:9px 3px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);font-weight:800;cursor:pointer;color:var(--text2);font-size:.73rem;font-family:'Nunito',sans-serif;transition:all .18s}
.mbtn.on{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;border-color:transparent}
.rtabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:9px;flex-shrink:0}
.rtabs::-webkit-scrollbar{display:none}
.rtab{flex-shrink:0;padding:6px 13px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface2);font-size:.7rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--text2);transition:all .16s;white-space:nowrap}
.ra-all    {border-color:var(--text3);color:var(--text);background:var(--purple-pale)}
.ra-leg    {border-color:rgba(245,158,11,.4);color:var(--gold);background:rgba(245,158,11,.07)}
.ra-ultra  {border-color:rgba(255,95,160,.35);color:var(--pink);background:rgba(255,95,160,.07)}
.ra-rare   {border-color:rgba(56,189,248,.35);color:var(--blue);background:rgba(56,189,248,.07)}
.ra-uncommon{border-color:rgba(34,211,160,.35);color:var(--green);background:rgba(34,211,160,.07)}
.ra-common {border-color:rgba(180,180,180,.4);color:#999;background:rgba(180,180,180,.07)}
.ra-exotic {border-color:rgba(255,100,220,.5);color:#ff64dc;background:rgba(255,100,220,.07)}
.ra-item   {border-color:rgba(176,106,255,.35);color:var(--purple);background:rgba(176,106,255,.07)}
.sinp{width:100%;padding:12px 16px;border-radius:14px;border:1.5px solid var(--border);background:var(--surface2);outline:none;font-family:'Nunito',sans-serif;font-size:.9rem;margin-bottom:9px;color:var(--text);flex-shrink:0;transition:border-color .2s}
.sinp::placeholder{color:var(--text3)}
.sinp:focus{border-color:var(--purple)}
.pet-list{flex:1;overflow-y:auto;padding-right:2px}
.pet-list::-webkit-scrollbar{width:3px}
.pet-list::-webkit-scrollbar-thumb{background:var(--border)}
.pet-row{display:flex;align-items:center;gap:12px;padding:9px 11px;border-radius:14px;cursor:pointer;border:1.5px solid transparent;margin-bottom:3px;transition:all .13s}
.pet-row:hover{background:var(--purple-pale);border-color:var(--border)}
.row-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Bubblegum Sans',cursive;font-size:.52rem;font-weight:700;color:white;text-align:center;line-height:1.2;padding:3px}
.row-name{font-weight:800;font-size:.88rem;color:var(--text)}
.row-rar{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.row-val{margin-left:auto;font-family:'Bubblegum Sans',cursive;font-size:1.1rem;color:var(--pink);white-space:nowrap}
.rc-leg{color:var(--gold)}.rc-ultra{color:var(--pink)}.rc-rare{color:var(--blue)}.rc-uncommon{color:var(--green)}.rc-common{color:#aaa}.rc-exotic{color:#ff64dc}.rc-item{color:var(--purple)}

/* VALUE LIST */
.list-search{width:100%;padding:13px 18px;border-radius:16px;border:1.5px solid var(--border);background:var(--surface);outline:none;font-family:'Nunito',sans-serif;font-size:.95rem;color:var(--text);margin-bottom:12px;transition:border-color .2s;box-shadow:0 2px 10px rgba(176,106,255,.06)}
.list-search::placeholder{color:var(--text3)}
.list-search:focus{border-color:var(--purple);box-shadow:0 2px 16px rgba(176,106,255,.12)}
.pet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:10px}

.pet-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:12px 8px 13px;text-align:center;position:relative;overflow:hidden;cursor:default;transition:all .22s cubic-bezier(.4,0,.2,1);box-shadow:0 2px 12px rgba(176,106,255,.06)}
.pet-card:hover{transform:translateY(-5px);border-color:var(--purple-l);box-shadow:0 14px 32px rgba(176,106,255,.15)}
.rline{position:absolute;top:0;left:0;right:0;height:4px;border-radius:18px 18px 0 0}
.leg .rline{background:linear-gradient(90deg,#f59e0b,#fde68a)}
.ultra .rline{background:linear-gradient(90deg,#ff5fa0,#ffb3d8)}
.rare .rline{background:linear-gradient(90deg,#38bdf8,#bae6fd)}
.uncommon .rline{background:linear-gradient(90deg,#22d3a0,#a7f3d0)}
.common .rline{background:linear-gradient(90deg,#ccc,#eee)}
.item .rline{background:linear-gradient(90deg,#b06aff,#d9b3ff)}
.exotic .rline{background:linear-gradient(90deg,#d946ef,#f0abfc,#a78bfa)}
.card-icon{width:64px;height:64px;border-radius:14px;margin:0 auto 8px;overflow:hidden;transition:transform .3s;background:var(--surface2)}
.pet-card:hover .card-icon{transform:scale(1.08)}
.card-name{font-size:.64rem;font-weight:800;line-height:1.3;height:28px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;color:var(--text2);margin-bottom:4px}
.card-val{font-family:'Bubblegum Sans',cursive;font-size:1.05rem;color:var(--text);display:flex;align-items:center;justify-content:center;gap:5px}
.trd{font-size:.58rem;padding:2px 6px;border-radius:100px;font-weight:800}
.t-up{background:rgba(255,95,160,.1);color:var(--pink)}
.t-dn{background:rgba(56,189,248,.1);color:var(--blue)}
.t-eq{color:var(--text3)}
.rpill{position:absolute;top:8px;right:7px;font-size:.43rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:2px 6px;border-radius:100px}
.leg .rpill{background:rgba(245,158,11,.1);color:var(--gold)}
.ultra .rpill{background:rgba(255,95,160,.1);color:var(--pink)}
.rare .rpill{background:rgba(56,189,248,.08);color:var(--blue)}
.uncommon .rpill{background:rgba(34,211,160,.08);color:var(--green)}
.common .rpill{background:rgba(180,180,180,.1);color:#aaa}
.item .rpill{background:rgba(176,106,255,.1);color:var(--purple)}
.exotic .rpill{background:rgba(217,70,239,.1);color:#d946ef}
.hot-badge{position:absolute;top:8px;left:7px;font-size:.42rem;font-weight:900;background:linear-gradient(135deg,#ff5fa0,#ff3d8e);color:white;padding:2px 6px;border-radius:100px}

/* ═══ TOP PET SPECIAL CARDS ═══ */
.pet-card.top-pet{
  border-width:2px;
  animation:topGlow 3s ease-in-out infinite;
  position:relative;
}
.pet-card.bat-dragon{
  border-color:#6600cc;
  background:linear-gradient(160deg,#1a0033,#0d001a,#1a0033);
}
.pet-card.bat-dragon .card-name{color:#cc88ff}
.pet-card.bat-dragon .card-val{color:#ff99ff}
.pet-card.bat-dragon .rline{background:linear-gradient(90deg,#6600cc,#ff00ff,#cc00ff,#6600cc);background-size:200%;animation:shimmerLine 2s linear infinite}
@keyframes shimmerLine{0%{background-position:0%}100%{background-position:200%}}

.pet-card.shadow-dragon{
  border-color:#330066;
  background:linear-gradient(160deg,#0d0020,#1a0033,#0d0020);
}
.pet-card.shadow-dragon .card-name{color:#bb88ff}
.pet-card.shadow-dragon .card-val{color:#ff6666}
.pet-card.shadow-dragon .rline{background:linear-gradient(90deg,#330066,#ff3300,#660000,#330066);background-size:200%;animation:shimmerLine 2s linear infinite}

@keyframes topGlow{
  0%,100%{box-shadow:0 0 14px 3px rgba(150,0,255,.3),0 4px 20px rgba(0,0,0,.4)}
  50%{box-shadow:0 0 28px 8px rgba(180,0,255,.55),0 4px 20px rgba(0,0,0,.4)}
}

.bat-dragon .card-icon,.shadow-dragon .card-icon{
  width:74px;height:74px;margin-bottom:6px;
  background:transparent !important;
  filter:drop-shadow(0 0 8px rgba(180,0,255,.7));
}
.bat-dragon:hover .card-icon,.shadow-dragon:hover .card-icon{
  filter:drop-shadow(0 0 16px rgba(220,0,255,.9));
  transform:scale(1.12);
}

/* Crown on top */
.crown-badge{
  position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  font-size:1rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));
  animation:crownBounce 2s ease-in-out infinite;
}
@keyframes crownBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-3px)}}

/* Stars sparkle */
.sparkle{
  position:absolute;font-size:.6rem;
  animation:sparklePop 2.5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes sparklePop{0%,100%{opacity:0;transform:scale(0.5)}50%{opacity:1;transform:scale(1)}}
.empty-msg{grid-column:1/-1;text-align:center;color:var(--text3);padding:50px;font-weight:700;font-size:1rem}

/* ═══ SLOT NAME LABEL ═══ */
.slot .sname{
  position:absolute;top:2px;left:0;right:0;
  font-size:.38rem;font-weight:900;text-align:center;
  color:rgba(255,255,255,.85);pointer-events:none;
  line-height:1.1;padding:0 2px;
  text-shadow:0 1px 3px rgba(0,0,0,.8);
}

/* ═══ LORE MODAL ═══ */
.lore-overlay{display:none;position:fixed;inset:0;background:rgba(42,26,62,.6);z-index:2000;backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px}
.lore-overlay.open{display:flex}
.lore-modal{
  background:var(--surface);border-radius:28px;
  max-width:400px;width:100%;
  border:2px solid var(--border);
  box-shadow:0 24px 60px rgba(176,106,255,.25);
  overflow:hidden;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
  position:relative;max-height:90vh;overflow-y:auto;
}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.lore-header{
  padding:22px 22px 16px;
  display:flex;align-items:center;gap:14px;
  border-bottom:1.5px solid var(--border);
  position:relative;
}
.lore-icon{
  width:72px;height:72px;border-radius:18px;overflow:hidden;
  flex-shrink:0;
}
.lore-title{font-family:'Bubblegum Sans',cursive;font-size:1.3rem;color:var(--text)}
.lore-rarity{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.lore-val-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.lore-chip{font-size:.7rem;font-weight:800;padding:3px 10px;border-radius:100px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text2)}
.lore-chip.gold{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--gold)}
.lore-close{
  position:absolute;top:14px;right:14px;
  background:var(--surface2);border:1.5px solid var(--border);
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:900;color:var(--text2);transition:all .18s;
}
.lore-close:hover{background:var(--red);color:white;border-color:var(--red)}
.lore-body{padding:18px 22px 24px}
.lore-section{margin-bottom:16px}
.lore-section-title{
  font-size:.62rem;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:6px;
}
.lore-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.lore-text{font-size:.82rem;line-height:1.65;color:var(--text2);font-weight:600}
.lore-tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.lore-tag{font-size:.62rem;font-weight:800;padding:3px 9px;border-radius:100px}
.lore-tag.released{background:rgba(56,189,248,.1);color:var(--blue);border:1px solid rgba(56,189,248,.2)}
.lore-tag.event{background:rgba(176,106,255,.1);color:var(--purple);border:1px solid rgba(176,106,255,.2)}
.lore-tag.limited{background:rgba(245,158,11,.1);color:var(--gold);border:1px solid rgba(245,158,11,.2)}
.lore-tag.obtainable{background:rgba(34,211,160,.1);color:var(--green);border:1px solid rgba(34,211,160,.2)}

/* ═══ PET CARD CLICKABLE ═══ */
.pet-card{cursor:pointer}
.pet-card:active{transform:scale(.97)}

/* ═══ TRADE IMPROVED ═══ */
.trade-diff{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:8px;font-size:.72rem;font-weight:800;
}
.diff-chip{padding:3px 12px;border-radius:100px;font-weight:900;font-size:.72rem}
.diff-win{background:rgba(34,211,160,.12);color:var(--green);border:1px solid rgba(34,211,160,.25)}
.diff-lose{background:rgba(56,189,248,.1);color:var(--blue);border:1px solid rgba(56,189,248,.2)}
.diff-fair{background:rgba(245,158,11,.08);color:var(--gold);border:1px solid rgba(245,158,11,.2)}
@media(max-width:520px){
  .content{padding:13px}
  .grids-wrap{flex-direction:column;align-items:center}
  .grid-box{width:100%;max-width:100%}
  .cvalue{font-size:2.2rem}
  .pet-grid{grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:8px}
}
</style>

          <div class="csub" id="count-you">0 pet</div>
        </div>

</div>

function goTo(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  const ic=id==='calc-page',il=id==='list-page';
  ['nt-c','nt-c2'].forEach(i=>{const e=document.getElementById(i);if(e)e.classList.toggle('on',ic)});
  ['nt-l','nt-l2'].forEach(i=>{const e=document.getElementById(i);if(e)e.classList.toggle('on',il)});
  if(il)renderList();
}

let curSide=null,curSlot=null,curMod='reg',curR=false,curF=false,pRar='all',lRar='all';
const trade={you:Array(9).fill(null),them:Array(9).fill(null)};

function setR(btn,ctx){
  const r=btn.dataset.r;
  const cont=ctx==='picker'?document.getElementById('picker-rtabs'):document.getElementById('list-rtabs');
  cont.querySelectorAll('.rtab').forEach(t=>{t.className=t.className.replace(/\bra-\S+/g,'').trim()});
  btn.classList.add('ra-'+r);
  if(ctx==='picker'){pRar=r;renderOptions();}else{lRar=r;renderList();}
}
function setMod(btn){
  curMod=btn.dataset.m;
  document.querySelectorAll('.mbtn[data-m]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');renderOptions();
}
function togRF(t){
  if(t==='R'){curR=!curR;document.getElementById('rb').classList.toggle('on',curR);}
  if(t==='F'){curF=!curF;document.getElementById('fb').classList.toggle('on',curF);}
}
function getVal(p){
  let v=p.v;
  if(p.r!=='item'){
    if(curMod==='neon')v*=4.5;
    else if(curMod==='mega')v*=18;
    if(curR)v*=1.15;if(curF)v*=1.15;
  }
  return v;
}
const fmt=n=>n<1?n.toFixed(2):n%1!==0?n.toFixed(1):n.toFixed(0);

function getType(n){
  n=n.toLowerCase();
  if(n==='bat dragon')return 'batdragon';
  if(n==='shadow dragon')return 'shadowdragon';
  if(n==='giraffe')return 'giraffe';
  if(n==='frost dragon')return 'frostdragon';
  if(n==='owl')return 'owl';
  if(n==='parrot')return 'parrot';
  if(n==='crow')return 'crow';
  if(n==='safari egg')return 'safariegg';
  if(n==='evil unicorn')return 'evunicorn';
  if(n==='african wild dog')return 'africanwilddog';
  if(n==='cryptid')return 'cryptid';
  if(n==='tombstone')return 'tombstone';
  if(n==='balloon unicorn')return 'balloonunicorn';
  if(n==='hedgehog')return 'hedgehog';
  if(n==='evil eye rattle')return 'evileye';
  if(n==='rainbow rattle')return 'rainbowrattle';
  if(/butter|moth|flutter/.test(n))return 'butterfly';
  if(/panda/.test(n))return 'panda';
  if(/penguin/.test(n))return 'penguin';
  if(/bee|hornet|wasp/.test(n))return 'bee';
  if(/bunny|rabbit|hare/.test(n))return 'bunny';
  if(/monkey|gorilla|gibbon|saru/.test(n))return 'monkey';
  if(/elephant/.test(n))return 'elephant';
  if(/fox|kitsune/.test(n))return 'fox';
  if(/cow|ox|bull|buffalo|bison/.test(n))return 'cow';
  if(/pig|boar|warthog/.test(n))return 'pig';
  if(/deer|elk|moose|stag|reindeer|buck/.test(n))return 'deer';
  if(/bear|polar|moon bear|yeti/.test(n))return 'bear';
  if(/dragon|wyvern|hydra|leviathan|naga|criosphinx|chimera|kaijunior|kraken/.test(n))return 'dragon';
  if(/unicorn|alicorn/.test(n))return 'unicorn';
  if(/cat|kitty|lynx|cheetah|panther|meerkat|tiger|lion|cerberus/.test(n))return 'cat';
  if(/dog|wolf|husky|dingo|hyena|shiba|dalmatian|poodle|labrador|spaniel|collie|shepherd|corgi|schnauzer|bulldog|pyrenees|canine|hound/.test(n))return 'dog';
  if(/owl|parrot|crow|flamingo|pelican|puffin|toucan|eagle|hawk|robin|kookaburra|pigeon|rooster|turkey|chick|duck|goose|peacock|ibis|magpie|emu|pheasant|bird/.test(n))return 'bird';
  if(/horse|pony|donkey|mule|stallion|mare/.test(n))return 'horse';
  if(/fish|shark|whale|dolphin|narwhal|seal|otter|jellyfish|seahorse|octopus|clownfish|puffer|crab|shrimp|squid|nautilus|slug|clam|mackerel|betta/.test(n))return 'fish';
  if(/sloth|bear/.test(n))return 'bear';
  if(/egg/.test(n))return 'egg';
  if(/potion|rattle|hammer/.test(n))return 'potion';
  return 'star';
}

function petSVG(p,size){
  const pal=RPAL[p.r]||RPAL.common;
  const t=getType(p.n);
  const svg=(SVGS[t]||SVGS.star).replace(/\{c1\}/g,pal.c1).replace(/\{c2\}/g,pal.c2).replace(/\{c3\}/g,pal.c3);
  return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg" style="display:block">${svg}</svg>`;
}

function openPicker(side,slot){
  curSide=side;curSlot=slot;
  document.getElementById('picker-search').value='';
  document.getElementById('picker').style.display='flex';
  document.getElementById('overlay').style.display='block';
  renderOptions();
  setTimeout(()=>document.getElementById('picker-search').focus(),120);
}
function closePicker(){
  document.getElementById('picker').style.display='none';
  document.getElementById('overlay').style.display='none';
}
function renderOptions(){
  const q=document.getElementById('picker-search').value.toLowerCase().trim();
  const cont=document.getElementById('pet-options');cont.innerHTML='';
  const list=PETS.filter(p=>(pRar==='all'||p.r===pRar)&&p.n.toLowerCase().includes(q));
  if(!list.length){cont.innerHTML='<div style="text-align:center;color:var(--text3);padding:28px;font-weight:700">No results 🥺</div>';return;}

}

function refreshSlot(side,slot){
  const id=(side==='you'?'sy-':'st-')+slot;
  const el=document.getElementById(id);if(!el)return;
  const d=trade[side][slot];
  if(!d){
    el.className='slot';
    el.innerHTML=`<svg class="plus" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>`;
    return;
  }
  const tag=(curMod!=='reg'?curMod[0].toUpperCase():'')+(curR?'R':'')+(curF?'F':'');
  el.className='slot filled';
  el.innerHTML=`
    <div style="width:68%;height:68%">${petSVG(d.pet,58)}</div>
    <div class="sval">${fmt(d.val)}</div>
    ${tag?`<div class="stag">${tag}</div>`:''}
    <div class="rm">✕</div>`;
  el.querySelector('.rm').addEventListener('click',ev=>{
    ev.stopPropagation();trade[side][slot]=null;refreshSlot(side,slot);updateVerdicts();
  });
}
function selectPet(pet,val){resumeAC();playPop();trade[curSide][curSlot]={pet,val};refreshSlot(curSide,curSlot);updateVerdicts();closePicker();}
function resetTrade(){
  trade.you.fill(null);trade.them.fill(null);
  for(let i=0;i<9;i++){refreshSlot('you',i);refreshSlot('them',i);}
  updateVerdicts();
}

// ═══════════════════════════════════════
//  VERDICT
// ═══════════════════════════════════════
function updateVerdicts(){
  const sY=trade.you.reduce((a,d)=>a+(d?d.val:0),0);
  const sT=trade.them.reduce((a,d)=>a+(d?d.val:0),0);
  const cY=trade.you.filter(d=>d).length;
  const cT=trade.them.filter(d=>d).length;

  document.getElementById('v-you').textContent=fmt(sY);
  document.getElementById('v-them').textContent=fmt(sT);
  document.getElementById('gv-you').textContent=fmt(sY);
  document.getElementById('gv-them').textContent=fmt(sT);

  // Pet counts
  const cy=document.getElementById('count-you');
  const ct=document.getElementById('count-them');
  if(cy) cy.textContent=cY+' pet'+(cY!==1?'s':'');
  if(ct) ct.textContent=cT+' pet'+(cT!==1?'s':'');

  // Balance bar
  const fill=document.getElementById('balance-fill');
  const balY=document.getElementById('bal-you');
  const balT=document.getElementById('bal-them');
  const total=sY+sT;
  if(fill&&total>0){
    const pct=Math.round((sY/total)*100);
    fill.style.width=pct+'%';
    const diff=pct-50;
    if(Math.abs(diff)<8) fill.style.background='linear-gradient(90deg,#22d3a0,#22d3a0)';
    else if(diff>0) fill.style.background='linear-gradient(90deg,#38bdf8,#60a5fa)';
    else fill.style.background='linear-gradient(90deg,#ff5fa0,#b06aff)';
    if(balY) balY.textContent='You \u2014 '+pct+'%';
    if(balT) balT.textContent=(100-pct)+'% \u2014 Them';
  } else if(fill){
    fill.style.width='50%';
    fill.style.background='linear-gradient(90deg,var(--pink),var(--purple))';
    if(balY) balY.textContent='You \u2014 0%';
    if(balT) balT.textContent='0% \u2014 Them';
  }

  const v=document.getElementById('verdict');v.className='verdict';
  if(sY===0&&sT===0){v.textContent='VS';document.getElementById('trade-diff').innerHTML='';return;}
  if(sT>sY*1.08){
    if(v.textContent!=='WIN 🎉'){playWin();confetti({particleCount:160,spread:80,origin:{y:.55},colors:['#ff5fa0','#b06aff','#38bdf8','#f59e0b','#22d3a0']});}
    v.textContent='WIN 🎉';v.classList.add('win');
  }else if(sT<sY*0.92){v.textContent='LOSE 🧊';v.classList.add('lose');
  }else{v.textContent='FAIR ✨';v.classList.add('fair');}

  // Diff chip
  const diffEl=document.getElementById('trade-diff');
  if(diffEl){
    const diff=sT-sY;
    const sign=diff>0?'+':'';
    const cls=diff>0?'diff-win':diff<0?'diff-lose':'diff-fair';
    diffEl.innerHTML=`<span class="diff-chip ${cls}">${sign}${fmt(diff)} pts</span>`;
  }
}

}

//  SOUND \u2014 Web Audio API (pas de fichier)
// ════════════════════════════════════════
let AC=null;
function getAC(){
  if(!AC) try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  return AC;
}
function playPop(){
  const ac=getAC();if(!ac)return;
  try{
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type='sine';
    o.frequency.setValueAtTime(600,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(900,ac.currentTime+0.06);
    g.gain.setValueAtTime(0.35,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.18);
    o.start();o.stop(ac.currentTime+0.18);
  }catch(e){}
}
function playWin(){
  const ac=getAC();if(!ac)return;
  try{
    [523,659,784,1046].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,ac.currentTime+i*0.1);
      g.gain.linearRampToValueAtTime(0.2,ac.currentTime+i*0.1+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.1+0.25);
      o.start(ac.currentTime+i*0.1);
      o.stop(ac.currentTime+i*0.1+0.25);
    });
  }catch(e){}
}
function resumeAC(){try{if(AC&&AC.state==='suspended')AC.resume();}catch(e){}}

// Default lore for pets not in the database
function getLore(pet){
  if(LORE[pet.n]) return LORE[pet.n];
  const rNames={leg:"L\u00e9gendaire",ultra:"Ultra-Rare",rare:"Rare",uncommon:"Uncommon",exotic:"Exotique",common:"Common",item:"Item"};
  const origins={
    leg:["Ce pet l\u00e9gendaire naquit lors d'un \u00e9v\u00e9nement sp\u00e9cial d'Adopt Me. Sa raret\u00e9 en fait l'un des plus convoit\u00e9s du jeu. Seuls les plus chanceux ou les plus anciens joueurs en poss\u00e8dent un.","Selon la l\u00e9gende, ce pet dormit pendant des si\u00e8cles dans un \u0153uf myst\u00e9rieux avant d'\u00eatre d\u00e9couvert par un joueur aventurier. Depuis, il est devenu l'un des symboles les plus pr\u00e9cieux du jeu."],
    ultra:["Ce pet Ultra-Rare fut d\u00e9couvert dans les r\u00e9gions les plus secr\u00e8tes d'Adopt Me. Peu de joueurs ont eu la chance de l'obtenir depuis sa sortie.","Cr\u00e9ature rare et pr\u00e9cieuse, ce pet porte en lui la magie des anciens royaumes d'Adopt Me. Il est tr\u00e8s appr\u00e9ci\u00e9 des collectionneurs."],
    rare:["Ce pet Rare habite les terres enchant\u00e9es d'Adopt Me depuis ses d\u00e9buts. Il est appr\u00e9ci\u00e9 autant pour sa beaut\u00e9 que pour sa personnalit\u00e9 unique.","N\u00e9 sous une constellation rare, ce pet poss\u00e8de des dons discrets mais pr\u00e9cieux. Les joueurs qui l'ont choy\u00e9 depuis longtemps ne s'en s\u00e9parent jamais."],
    exotic:["Ce pet Exotique est l'un des plus r\u00e9cents et des plus recherch\u00e9s d'Adopt Me. Sa sortie limit\u00e9e en a fait imm\u00e9diatement une c\u00e9l\u00e9brit\u00e9 dans la communaut\u00e9 des traders.","Apparu lors d'un \u00e9v\u00e9nement exclusif, ce pet Exotique repr\u00e9sente la nouvelle g\u00e9n\u00e9ration des l\u00e9gendaires d'Adopt Me. Beau, rare et tr\u00e8s demand\u00e9."],
    uncommon:["Ce pet Uncommon accompagne les joueurs depuis les premi\u00e8res heures d'Adopt Me. Simple en apparence, il cache une grande loyaut\u00e9 et une \u00e2me sinc\u00e8re.","Discret mais attachant, ce pet Uncommon est souvent sous-estim\u00e9. Ceux qui l'ont gard\u00e9 depuis longtemps savent qu'il a une valeur sentimentale immense."],
    common:["Ce pet Common est le compagnon de tous les jours dans Adopt Me. Il accueille les nouveaux joueurs avec enthousiasme et leur enseigne les bases du jeu.","Simple, joyeux et toujours l\u00e0 \u2014 ce pet Common est souvent le premier animal que les joueurs obtiennent."],
    item:["Cet item pr\u00e9cieux d'Adopt Me circule entre les mains des meilleurs traders. Sa valeur varie selon la demande du march\u00e9 et son histoire dans le jeu.","Item rare et convoit\u00e9, il fait partie des objets les plus \u00e9chang\u00e9s sur le march\u00e9 d'Adopt Me."]
  };
  const perso={
    leg:["Fier et majestueux, ce pet sait qu'il est exceptionnel. Il traite ses propri\u00e9taires comme des \u00e9gaux et attend d'eux qu'ils soient \u00e0 la hauteur.","Myst\u00e9rieux et puissant, ce l\u00e9gendaire ne se r\u00e9v\u00e8le vraiment qu'\u00e0 ceux qui m\u00e9ritent sa confiance."],
    ultra:["Vif et affectueux, ce pet Ultra-Rare adore les aventures. Il suit son ma\u00eetre partout et prot\u00e8ge sa maison avec fiert\u00e9.","Curieux et intelligent, ce pet observe tout avec de grands yeux brillants. Il apprend vite et surprend souvent ses propri\u00e9taires."],
    exotic:["\u00c9l\u00e9gant et tendance, ce pet Exotique attire tous les regards. Il aime \u00eatre au centre de l'attention et fait des entr\u00e9es remarqu\u00e9es.","Plein de vie et d'\u00e9nergie, ce pet Exotique apporte de la couleur partout o\u00f9 il passe. Il est devenu l'un des favoris de la communaut\u00e9."],
    rare:["Doux et joueur, ce Rare est le compagnon id\u00e9al. Il adore les c\u00e2lins et les promenades dans les jardins magiques d'Adopt Me.","Attachant et fid\u00e8le, ce pet Rare reste toujours pr\u00e8s de son ma\u00eetre et le prot\u00e8ge des mauvaises rencontres."],
    uncommon:["Simple et sinc\u00e8re, ce pet Uncommon n'a pas besoin de raret\u00e9 pour \u00eatre aim\u00e9. Sa vraie valeur, c'est sa loyaut\u00e9 sans faille.","Joyeux et spontan\u00e9, ce Uncommon apporte bonne humeur et l\u00e9g\u00e8ret\u00e9 dans toutes les situations."],
    common:["Ce Common est le meilleur ami de premi\u00e8re heure. Toujours l\u00e0, toujours heureux, il ne demande rien sauf un peu d'amour.","Enthousiaste et sans pr\u00e9tention, ce Common est le compagnon id\u00e9al pour les nouveaux joueurs."],
    item:["Cet item traverse les mains des plus grands traders d'Adopt Me. Son histoire est aussi riche que sa valeur.","Pr\u00e9cieux et rare, cet item est un troph\u00e9e pour ceux qui le poss\u00e8dent."]
  };
  const r=pet.r||'common';
  const o=origins[r]||origins.common;
  const p=perso[r]||perso.common;
  return {
    released:pet.released||"Adopt Me",
    story:o[Math.floor(pet.n.length%2)],
    personality:p[Math.floor((pet.n.length+1)%2)],
    tags:[RL[r]||r, pet.hot?"Tr\u00e8s recherch\u00e9":null, "Adopt Me"].filter(Boolean)
  };
}

//  LORE MODAL FUNCTIONS
// ════════════════════════════════════════
function openLore(pet){
  resumeAC();playPop();
  const lore=getLore(pet);
  document.getElementById('lore-name').textContent=pet.n;
  const rarEl=document.getElementById('lore-rar');
  rarEl.textContent=RL[pet.r]||pet.r;
  rarEl.className='lore-rarity rc-'+(pet.r||'common');
  document.getElementById('lore-val').textContent='⭐ Valeur: '+fmt(pet.v);
  document.getElementById('lore-date').textContent='📅 '+lore.released;
  document.getElementById('lore-story').textContent=lore.story;
  document.getElementById('lore-personality').textContent=lore.personality;
  // Icon
  const iconEl=document.getElementById('lore-icon');
  iconEl.innerHTML=petSVG(pet,72);
  iconEl.style.background=RPAL[pet.r]?RPAL[pet.r].c1+' ':RC[pet.r]||'#eee';
  // Tags
  const tagsEl=document.getElementById('lore-tags');
  tagsEl.innerHTML='';
  (lore.tags||[]).forEach(t=>{
    const tag=document.createElement('span');
    tag.className='lore-tag '+(/event|limit\u00e9|limit\u00e9/i.test(t)?'event':/obtainable|jeu/i.test(t)?'obtainable':/\d{4}|egg|star/i.test(t)?'released':'limited');
    tag.textContent=t;
    tagsEl.appendChild(tag);
  });
  document.getElementById('lore-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLore(){
  document.getElementById('lore-overlay').classList.remove('open');
  document.body.style.overflow='';
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
function init(){
  for(let i=0;i<9;i++){
    ['you','them'].forEach(side=>{
      const el=document.createElement('div');
      el.className='slot';el.id=(side==='you'?'sy-':'st-')+i;
      el.innerHTML=`<svg class="plus" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>`;
      el.addEventListener('click',()=>openPicker(side,i));
      document.getElementById(side==='you'?'grid-you':'grid-them').appendChild(el);
    });
  }
  document.getElementById('stat-count').textContent=PETS.length;
  document.getElementById('stat-leg').textContent=PETS.filter(p=>p.r==='leg').length;
}
init();
