<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FairyValue 🧚 - VERSION RESTAURÉE</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fff5f7; margin: 0; padding: 0; }
        
        /* Accueil */
        #home { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: pink; }
        .title { font-size: 50px; color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); }
        .btn { padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 50px; border: none; background: white; color: #f72585; font-weight: bold; margin: 10px; }

        /* Pages */
        .page { display: none; padding: 20px; text-align: center; }
        .active { display: block; }

        /* Calculateur */
        .calc-box { background: white; padding: 20px; border-radius: 20px; display: inline-block; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .bar-bg { width: 300px; height: 20px; background: #eee; border-radius: 10px; margin: 10px auto; overflow: hidden; }
        #bar-fill { width: 50%; height: 100%; background: #f72585; transition: 0.3s; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #ffe5ec; padding: 15px; border-radius: 20px; width: 300px; margin: 10px auto; }
        .slot { width: 90px; height: 90px; background: white; border-radius: 15px; border: 2px solid #ffb3c1; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .slot img { width: 80%; height: 80%; object-fit: contain; }

        /* Fenêtre de choix (Picker) */
        #picker { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; height: 80%; background: white; z-index: 10; border-radius: 20px; padding: 20px; overflow-y: auto; box-shadow: 0 0 100px rgba(0,0,0,0.5); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 5; }
        .pet-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .pet-item img { width: 60px; height: 60px; margin-right: 20px; }
    </style>
</head>
<body>

    <div id="home" class="active">
        <h1 class="title">FAIRYVALUE 🧚</h1>
        <button class="btn" onclick="show('calc')">CALCULATEUR</button>
        <button class="btn" onclick="show('list')">LISTE DES VALEURS</button>
    </div>

    <div id="calc" class="page">
        <button onclick="show('home')">RETOUR</button>
        <br><br>
        <div class="calc-box">
            <div style="font-size: 30px; font-weight: bold;">
                <span id="txt-you">0</span> vs <span id="txt-them" style="color:#f72585">0</span>
            </div>
            <div class="bar-bg"><div id="bar-fill"></div></div>
        </div>

        <div style="display: flex; justify-content: center; flex-wrap: wrap; gap: 20px;">
            <div>
                <h3>TOI</h3>
                <div class="grid">
                    <div class="slot" onclick="openP('you', 0)" id="y0">+</div>
                    <div class="slot" onclick="openP('you', 1)" id="y1">+</div>
                    <div class="slot" onclick="openP('you', 2)" id="y2">+</div>
                    <div class="slot" onclick="openP('you', 3)" id="y3">+</div>
                    <div class="slot" onclick="openP('you', 4)" id="y4">+</div>
                    <div class="slot" onclick="openP('you', 5)" id="y5">+</div>
                    <div class="slot" onclick="openP('you', 6)" id="y6">+</div>
                    <div class="slot" onclick="openP('you', 7)" id="y7">+</div>
                    <div class="slot" onclick="openP('you', 8)" id="y8">+</div>
                </div>
            </div>
            <div>
                <h3>EUX</h3>
                <div class="grid">
                    <div class="slot" onclick="openP('them', 0)" id="t0">+</div>
                    <div class="slot" onclick="openP('them', 1)" id="t1">+</div>
                    <div class="slot" onclick="openP('them', 2)" id="t2">+</div>
                    <div class="slot" onclick="openP('them', 3)" id="t3">+</div>
                    <div class="slot" onclick="openP('them', 4)" id="t4">+</div>
                    <div class="slot" onclick="openP('them', 5)" id="t5">+</div>
                    <div class="slot" onclick="openP('them', 6)" id="t6">+</div>
                    <div class="slot" onclick="openP('them', 7)" id="t7">+</div>
                    <div class="slot" onclick="openP('them', 8)" id="t8">+</div>
                </div>
            </div>
        </div>
    </div>

    <div id="list" class="page">
        <button onclick="show('home')">RETOUR</button>
        <h2>VALEURS DES PETS</h2>
        <div id="list-container" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;"></div>
    </div>

    <div class="overlay" id="over" onclick="closeP()"></div>
    <div id="picker">
        <h3>Choisir un Pet</h3>
        <div id="options">
            <div class="pet-item" onclick="sel('Shadow Dragon', 1000, 'shadow_dragon.png')"><img src="shadow_dragon.png"> Shadow Dragon (1000)</div>
            <div class="pet-item" onclick="sel('Bat Dragon', 865, 'bat_dragon.png')"><img src="bat_dragon.png"> Bat Dragon (865)</div>
            <div class="pet-item" onclick="sel('Frost Dragon', 415, 'frost_dragon.png')"><img src="frost_dragon.png"> Frost Dragon (415)</div>
            <div class="pet-item" onclick="sel('Arctic Reindeer', 45, 'arctic_reindeer.png')"><img src="arctic_reindeer.png"> Arctic Reindeer (45)</div>
            <div class="pet-item" onclick="sel('Cow', 16, 'cow.png')"><img src="cow.png"> Cow (16)</div>
            <div class="pet-item" onclick="sel('Giant Panda', 3.5, 'giant_panda.png')"><img src="giant_panda.png"> Giant Panda (3.5)</div>
            <div class="pet-item" onclick="sel('Unicorn', 2.5, 'unicorn.png')"><img src="unicorn.png"> Unicorn (2.5)</div>
            <div class="pet-item" onclick="sel('Turtle', 21, 'turtle.png')"><img src="turtle.png"> Turtle (21)</div>
        </div>
    </div>

    <script>
        let side = 'you';
        let slotIndex = 0;
        let valYou = [0,0,0,0,0,0,0,0,0];
        let valThem = [0,0,0,0,0,0,0,0,0];

        function show(id) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('calc').style.display = 'none';
            document.getElementById('list').style.display = 'none';
            document.getElementById(id).style.display = 'block';
            if(id === 'home') document.getElementById(id).style.display = 'flex';
        }

        function openP(s, i) {
            side = s;
            slotIndex = i;
            document.getElementById('picker').style.display = 'block';
            document.getElementById('over').style.display = 'block';
        }

        function closeP() {
            document.getElementById('picker').style.display = 'none';
            document.getElementById('over').style.display = 'none';
        }

        function sel(name, val, img) {
            let id = (side === 'you') ? 'y' + slotIndex : 't' + slotIndex;
            document.getElementById(id).innerHTML = '<img src="' + img + '">';
            
            if(side === 'you') valYou[slotIndex] = val;
            else valThem[slotIndex] = val;

            // Calcul
            let totalYou = 0; for(let i=0; i<9; i++) { totalYou += valYou[i]; }
            let totalThem = 0; for(let i=0; i<9; i++) { totalThem += valThem[i]; }

            document.getElementById('txt-you').innerText = totalYou;
            document.getElementById('txt-them').innerText = totalThem;

            let total = totalYou + totalThem;
            let percent = (total === 0) ? 50 : (totalYou / total) * 100;
            document.getElementById('bar-fill').style.width = percent + '%';

            closeP();
        }
    </script>
</body>
</html>
