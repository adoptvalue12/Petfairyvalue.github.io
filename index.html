<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairyValue 🧚 - Edition Royale</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff85a2; --accent: #f72585; --bg-rose: #ffe5ec; --slot-border: #ffb3c1;
            --legendary: linear-gradient(135deg, #ffcc33 0%, #ffab1a 100%);
            --ultra: linear-gradient(135deg, #ff85e1 0%, #f72585 100%);
            --rare: linear-gradient(135deg, #4cc9f0 0%, #4361ee 100%);
            --uncommon: linear-gradient(135deg, #b5e48c 0%, #76c893 100%);
            --common: linear-gradient(135deg, #dee2e6 0%, #adb5bd 100%);
            --exotic: linear-gradient(135deg, #b79ced 0%, #7209b7 100%);
        }
        
        body, html { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; min-height: 100vh; background: #fff5f7; color: #333; overflow-x: hidden; }
        
        /* HOME PAGE ATTRACTIVE */
        #home-page {
            height: 100vh; background: linear-gradient(rgba(255, 133, 162, 0.3), rgba(0,0,0,0.7)), url('https://wallpapers.com/images/hd/adopt-me-background-r2fa0g7qap0177br.jpg');
            background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        
        .hero-title { 
            font-size: 5.5rem; font-weight: 900; color: white;
            text-shadow: 0 0 30px var(--accent), 0 10px 10px rgba(0,0,0,0.5);
            animation: float 3s ease-in-out infinite; margin: 0;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .btn-container { display: flex; gap: 20px; margin-top: 40px; }
        .glass-btn { 
            background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); border: 3px solid white;
            padding: 20px 45px; border-radius: 60px; color: white; font-weight: 900; font-size: 1.3rem;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .glass-btn:hover { background: white; color: var(--accent); transform: scale(1.1) rotate(-2deg); }

        /* SECTIONS */
        .section { display: none; padding: 30px; animation: slideUp 0.5s ease; }
        .active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* TRADE CALCULATOR (Design conservé, fond amélioré) */
        .elve-container { background: white; border-radius: 40px; padding: 30px; max-width: 550px; margin: 0 auto 30px; box-shadow: 0 25px 60px rgba(247,37,133,0.2); text-align: center; }
        .trade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; background: white; padding: 20px; border-radius: 35px; border: 6px solid var(--bg-rose); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .slot { width: 95px; height: 95px; background: #fdfdfd; border: 3px solid #eee; border-radius: 25px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: 0.2s; }
        .slot:hover { border-color: var(--accent); background: #fff0f5; }
        .slot img { width: 80%; height: 80%; object-fit: contain; }
        .slot-label { position: absolute; bottom: 5px; right: 5px; font-size: 0.7rem; font-weight: 900; color: white; background: var(--accent); padding: 3px 7px; border-radius: 8px; }

        /* VALUE LIST STYLÉE */
        .pet-card { 
            background: white; border-radius: 30px; padding: 20px; text-align: center; 
            transition: 0.3s; position: relative; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 2px solid transparent;
        }
        .pet-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .pet-card img { width: 100px; height: 100px; object-fit: contain; margin-bottom: 10px; z-index: 2; position: relative; }
        
        .rarity-bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 60px; 
            opacity: 0.2; z-index: 1; border-radius: 0 0 50% 50%;
        }

        /* PICKER */
        #picker { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; width:95%; max-width: 600px; height:80vh; z-index:2000; border-radius:45px; padding:35px; box-shadow: 0 0 100px rgba(0,0,0,0.5); overflow-y: auto; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index:1999; }
        
        input[type="text"] { width: 100%; padding: 18px; border-radius: 25px; border: 3px solid #eee; font-family: 'Outfit'; font-weight: 600; font-size: 1.1rem; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--accent); }
    </style>
</head>
<body>

    <audio id="sound-pop" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="sound-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <div id="home-page">
        <h1 class="hero-title">FAIRYVALUE 🧚</h1>
        <div class="btn-container">
            <button class="glass-btn" onclick="playSound('pop'); showPage('list-page')">VALEURS 📈</button>
            <button class="glass-btn" onclick="playSound('pop'); showPage('calc-page')">TRADES ✨</button>
        </div>
    </div>

    <div id="calc-page" class="section">
        <button onclick="playSound('click'); showPage('home-page')" style="background:none; border:none; color:var(--accent); font-weight:900; cursor:pointer; font-size:1.2rem;">← RETOUR</button>
        <div class="elve-container">
            <div style="display:flex; justify-content:center; gap:40px; font-weight:900; color:#ccc; font-size:1.3rem;">
                <span id="l-win">WIN</span> <span id="l-fair">FAIR</span> <span id="l-lose">LOSE</span>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:4rem; font-weight:900; margin:15px 0;">
                <span id="v-you">0</span> <span id="v-them" style="color:var(--accent)">0</span>
            </div>
            <div style="height:18px; background:#f0f0f0; border-radius:20px; overflow:hidden;">
                <div id="fill" style="height:100%; width:50%; background:var(--accent); transition:1s cubic-bezier(0.175, 0.885, 0.32, 1.275);"></div>
            </div>
        </div>
        <div style="display:flex; justify-content:center; gap:40px; flex-wrap:wrap;">
            <div><h3 style="text-align:center; color:var(--primary);">VOTRE OFFRE</h3><div class="trade-grid" id="grid-you"></div></div>
            <div><h3 style="text-align:center; color:var(--accent);">LEUR OFFRE</h3><div class="trade-grid" id="grid-them"></div></div>
        </div>
    </div>

    <div id="list-page" class="section">
        <button onclick="playSound('click'); showPage('home-page')" style="background:none; border:none; color:var(--accent); font-weight:900; cursor:pointer; font-size:1.2rem;">← RETOUR</button>
        <h2 style="text-align:center; font-size:3rem; margin-bottom:40px;">TOP PETS LIST 💎</h2>
        <div id="full-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap:25px;"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closePicker()"></div>
    <div id="picker">
        <input type="text" id="search" placeholder="Rechercher un pet..." onkeyup="filterPets()">
        <div id="pet-options" style="margin-top:20px;"></div>
    </div>

    <script>
        const pets = [
            { n: "Bat Dragon", v: 1000, r: "legendary" },
            { n: "Shadow Dragon", v: 850, r: "legendary" },
            { n: "Giraffe", v: 520, r: "legendary" },
            { n: "Frost Dragon", v: 415, r: "legendary" },
            { n: "Blazing Lion", v: 145.0, r: "legendary" },
            { n: "Blue Egg", v: 130.0, r: "legendary" },
            { n: "Jungle Egg", v: 95.0, r: "legendary" },
            { n: "Pink Egg", v: 65.0, r: "legendary" },
            { n: "Hedgehog", v: 38.5, r: "ultra" },
            { n: "Dalmatian", v: 18.5, r: "ultra" },
            { n: "Cow", v: 16.0, r: "rare" },
            { n: "Cryptid", v: 12.0, r: "ultra", tag: "EXO" },
            { n: "Diamond Butterfly", v: 10.5, r: "legendary" },
            { n: "Caelum Cervi", v: 9.5, r: "legendary" },
            { n: "Dragonfruit Fox", v: 4.5, r: "legendary" },
            { n: "Rooster", v: 1.2, r: "rare" },
            { n: "Purple Butterfly", v: 1.8, r: "ultra" }
        ];

        let curSide = 'you', curSlot = 0;
        let dataYou = Array(9).fill(0), dataThem = Array(9).fill(0);

        function playSound(type) {
            const s = document.getElementById('sound-' + type);
            s.currentTime = 0; s.play();
        }

        function showPage(id) {
            document.getElementById('home-page').style.display = (id === 'home-page') ? 'flex' : 'none';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'list-page') renderValueList();
        }

        function getImgUrl(name) {
            let wikiName = name === "Cryptid" ? "Cryptid_Hound" : name.replace(/ /g, "_");
            return `https://adoptme.fandom.com/wiki/Special:FilePath/${wikiName}.png?width=150`;
        }

        function openPicker(side, slot) {
            playSound('click'); curSide = side; curSlot = slot;
            document.getElementById('picker').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            renderOptions();
        }

        function renderOptions() {
            const opt = document.getElementById('pet-options');
            opt.innerHTML = "";
            pets.sort((a,b) => b.v - a.v).forEach(p => {
                const img = getImgUrl(p.n);
                opt.innerHTML += `
                    <div class="slot" style="width:100%; height:auto; padding:10px; margin-bottom:10px; justify-content:flex-start; gap:20px;" onclick="selectPet('${p.n}', ${p.v}, '${img}')">
                        <img src="${img}" style="width:50px; height:50px;">
                        <div style="text-align:left"><b>${p.n}</b><br><small>${p.r}</small></div>
                        <b style="margin-left:auto; color:var(--accent)">${p.v}</b>
                    </div>`;
            });
        }

        function selectPet(name, val, img) {
            playSound('pop');
            const id = curSide === 'you' ? `sy-${curSlot}` : `st-${curSlot}`;
            document.getElementById(id).innerHTML = `<img src="${img}"><div class="slot-label">REG</div>`;
            if(curSide === 'you') dataYou[curSlot] = val; else dataThem[curSlot] = val;
            updateBar(); closePicker();
        }

        function updateBar() {
            const sY = dataYou.reduce((a,b)=>a+b,0), sT = dataThem.reduce((a,b)=>a+b,0);
            document.getElementById('v-you').innerText = sY.toFixed(1);
            document.getElementById('v-them').innerText = sT.toFixed(1);
            const total = sY + sT;
            document.getElementById('fill').style.width = total === 0 ? "50%" : (sY / total * 100) + "%";
        }

        function renderValueList() {
            const container = document.getElementById('full-list');
            container.innerHTML = "";
            pets.forEach(p => {
                const img = getImgUrl(p.n);
                const rarityColor = `var(--${p.tag === 'EXO' ? 'exotic' : p.r})`;
                container.innerHTML += `
                    <div class="pet-card">
                        <div class="rarity-bg" style="background:${rarityColor}"></div>
                        <img src="${img}">
                        <h4 style="margin:5px 0; color:#333;">${p.n}</h4>
                        <div style="background:${rarityColor}; color:white; font-size:0.7rem; padding:3px 10px; border-radius:10px; display:inline-block; margin-bottom:10px;">${p.tag || p.r}</div>
                        <div style="font-size:1.5rem; font-weight:900; color:var(--accent)">${p.v}</div>
                    </div>`;
            });
        }

        function closePicker() { document.getElementById('picker').style.display='none'; document.getElementById('overlay').style.display='none'; }
        function filterPets() {
            const s = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('#pet-options .slot').forEach(o => o.style.display = o.innerText.toLowerCase().includes(s) ? "flex" : "none");
        }

        function init() {
            const gy = document.getElementById('grid-you'), gt = document.getElementById('grid-them');
            for(let i=0; i<9; i++) {
                gy.innerHTML += `<div class="slot" onclick="openPicker('you', ${i})" id="sy-${i}">+</div>`;
                gt.innerHTML += `<div class="slot" onclick="openPicker('them', ${i})" id="st-${i}">+</div>`;
            }
        }
        init();
    </script>
</body>
</html>
