<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairyValue 🧚 - Stable Images & Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff85a2; --accent: #f72585; --bg-rose: #ffe5ec; --slot-border: #ffb3c1;
            --legendary: #ffac33; --ultra: #ff66cc; --rare: #33ccff; --uncommon: #66ff66; --common: #b3b3b3;
        }
        body, html { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; min-height: 100vh; color: #333; background: #fff5f7; overflow-x: hidden; }
        
        /* Menu Accueil */
        #home-page {
            height: 100vh; background: linear-gradient(rgba(255, 133, 162, 0.4), rgba(0,0,0,0.6)), url('https://wallpapers.com/images/hd/adopt-me-background-r2fa0g7qap0177br.jpg');
            background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white;
        }
        .hero-title { font-size: 4.5rem; font-weight: 900; text-shadow: 0 5px 20px rgba(0,0,0,0.4); margin: 0; letter-spacing: -3px; }
        
        .btn-container { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .glass-btn { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 3px solid white; padding: 18px 45px; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1rem; box-shadow: 0 8px 25px rgba(0,0,0,0.2); text-transform: uppercase; }
        .glass-btn:hover { background: white; color: var(--accent); transform: translateY(-5px); }

        .section { display: none; padding: 25px; animation: fadeIn 0.4s ease-out; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Calculateur */
        .elve-container { background: white; border-radius: 35px; padding: 25px; max-width: 500px; margin: 0 auto 20px; box-shadow: 0 20px 60px rgba(255,133,162,0.3); text-align: center; border: 1px solid var(--bg-rose); }
        .elve-bar { height: 18px; background: #f0f0f0; border-radius: 20px; margin: 15px 0; overflow: hidden; display: flex; border: 2px solid #eee; position: relative; }
        #fill { height: 100%; width: 50%; background: linear-gradient(90deg, #ff944d, #f72585); transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 20px; }

        .trade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; background: var(--bg-rose); padding: 15px; border-radius: 25px; border: 4px solid var(--slot-border); box-shadow: inset 0 2px 10px rgba(0,0,0,0.05); }
        .slot { width: 85px; height: 85px; background: white; border: 2px solid var(--slot-border); border-radius: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: 0.2s; overflow: hidden; }
        .slot:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .slot img { width: 80%; height: 80%; object-fit: contain; }
        .slot-label { position: absolute; bottom: 4px; right: 6px; font-size: 0.7rem; font-weight: 900; color: white; background: var(--accent); padding: 2px 6px; border-radius: 6px; z-index: 10; }

        /* Picker */
        #picker { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; width:95%; max-width: 650px; height:85vh; z-index:2000; border-radius:40px; padding:35px; box-shadow: 0 0 100px rgba(0,0,0,0.5); overflow-y: auto; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px); z-index:1999; }
        
        .modifier-row { display: flex; justify-content: space-around; background: #fdf0f3; padding: 15px; border-radius: 25px; margin-bottom: 25px; }
        .mod-btn { cursor: pointer; padding: 10px 25px; border-radius: 18px; border: 2px solid #ffccd5; background: white; font-weight: bold; transition: 0.2s; font-size: 1rem; }
        .mod-btn.selected { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.05); box-shadow: 0 5px 15px rgba(247, 37, 133, 0.2); }

        .pet-option { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #fff0f3; cursor: pointer; transition: 0.2s; border-radius: 20px; }
        .pet-option:hover { background: #fff5f7; transform: translateX(10px); }
        .pet-option img { width: 65px; height: 65px; object-fit: contain; margin-right: 15px; }
        .rarity-tag { font-size: 0.65rem; font-weight: 900; color: white; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; margin-top: 5px; display: inline-block; }

        #search { width: 100%; padding: 18px 25px; border-radius: 50px; border: 2px solid #eee; margin-bottom: 25px; outline: none; font-size: 1.1rem; box-sizing: border-box; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        #search:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(255,133,162,0.2); }
    </style>
</head>
<body>

    <div id="home-page">
        <h1 class="hero-title">FAIRYVALUE 🧚</h1>
        <p style="font-weight: 500; opacity: 0.9; margin-top: -10px;">L'outil de trade Adopt Me premium</p>
        <div class="btn-container">
            <button class="glass-btn" onclick="showPage('list-page')">VALUE LIST 📈</button>
            <button class="glass-btn" onclick="showPage('calc-page')">WFL CALCULATOR ✨</button>
        </div>
    </div>

    <div id="calc-page" class="section">
        <button onclick="showPage('home-page')" style="background:none; border:none; color:var(--accent); font-weight:900; cursor:pointer; font-size: 1.1rem; margin-bottom: 15px;">← RETOUR</button>
        <div class="elve-container">
            <div style="display:flex; justify-content:center; gap:25px; font-weight:900; color:#ddd;"><span id="l-win">WIN</span> <span id="l-fair">FAIR</span> <span id="l-lose">LOSE</span></div>
            <div style="display:flex; justify-content:space-between; font-size:2.8rem; font-weight:900; margin:10px 0; color:#444;"><span id="v-you">0</span> <span id="v-them" style="color:var(--accent)">0</span></div>
            <div class="elve-bar"><div id="fill"></div></div>
        </div>
        <div style="display:flex; justify-content:center; gap:25px; flex-wrap:wrap;">
            <div><h4 style="text-align:center;color:var(--primary); font-size: 1.3rem;">YOU</h4><div class="trade-grid" id="grid-you"></div></div>
            <div><h4 style="text-align:center;color:var(--accent); font-size: 1.3rem;">THEM</h4><div class="trade-grid" id="grid-them"></div></div>
        </div>
        <center><button onclick="location.reload()" style="margin-top:35px; padding:15px 55px; border-radius:50px; border:none; background:linear-gradient(to right, var(--primary), var(--accent)); color:white; font-weight:900; cursor:pointer; box-shadow: 0 10px 20px rgba(247, 37, 133, 0.3); font-size: 1.1rem; text-transform:uppercase;">RESET TRADE</button></center>
    </div>

    <div id="list-page" class="section">
        <button onclick="showPage('home-page')" style="background:none; border:none; color:var(--accent); font-weight:900; cursor:pointer;">← RETOUR</button>
        <h2 style="text-align:center; color:var(--accent); font-size: 2.2rem; margin-bottom: 35px;">FAIRY DATABASE 📊</h2>
        <div id="full-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap:20px;"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closePicker()"></div>
    <div id="picker">
        <div class="modifier-row">
            <div class="mod-btn" id="m-normal" onclick="setMod('normal')">Normal</div>
            <div class="mod-btn" id="m-neon" onclick="setMod('neon')">Neon</div>
            <div class="mod-btn" id="m-mega" onclick="setMod('mega')">Mega</div>
        </div>
        <div class="modifier-row" style="margin-top:-15px; background: none; justify-content: center; gap: 40px;">
            <label style="font-weight: bold; cursor:pointer;"><input type="checkbox" id="fly" style="accent-color: var(--accent); width: 18px; height: 18px; vertical-align: middle;"> Fly</label>
            <label style="font-weight: bold; cursor:pointer;"><input type="checkbox" id="ride" style="accent-color: var(--accent); width: 18px; height: 18px; vertical-align: middle;"> Ride</label>
        </div>
        <input type="text" id="search" placeholder="Chercher un pet (ex: Cow, Panda...)" onkeyup="filterPets()">
        <div id="pet-options"></div>
    </div>

    <script>
        // Database des valeurs Elvebredd
        const pets = [
            // HIGH TIERS
            { n: "Shadow Dragon", v: 1000, r: "legendary" },
            { n: "Bat Dragon", v: 865, r: "legendary" },
            { n: "Frost Dragon", v: 415, r: "legendary" },
            { n: "Giraffe", v: 520, r: "legendary" },
            { n: "Owl", v: 265, r: "legendary" },
            { n: "Parrot", v: 215, r: "legendary" },
            { n: "Evil Unicorn", v: 165, r: "legendary" },
            { n: "Crow", v: 155, r: "legendary" },
            { n: "Blazing Lion", v: 145, r: "legendary" },
            { n: "Arctic Reindeer", v: 45, r: "legendary" },
            { n: "Diamond Butterfly", v: 42, r: "legendary" },

            // TA LISTE (LÉGENDAIRES)
            { n: "Albino Monkey", v: 24, r: "legendary" }, // FIX: Stable Image
            { n: "Balloon Unicorn", v: 14.5, r: "legendary" }, // FIX: Stable Image
            { n: "Cerberus", v: 1.8, r: "legendary" }, // FIX: Stable Image
            { n: "Unicorn", v: 2.5, r: "legendary" }, // FIX: Stable Image
            { n: "Giant Panda", v: 35, r: "legendary" }, // FIX: Legendary & stable
            { n: "Turtle", v: 21, r: "legendary" },
            { n: "Kangaroo", v: 18.5, r: "legendary" },
            { n: "Cactus Friend", v: 3.5, r: "legendary" },
            { n: "Ancient Dragon", v: 2.2, r: "legendary" },
            { n: "Axolotl", v: 2, r: "legendary" },
            { n: "Chameleon", v: 2.8, r: "legendary" },
            { n: "Dancing Dragon", v: 4, r: "legendary" },
            { n: "Dodo", v: 2.5, r: "legendary" },
            { n: "Frost Fury", v: 5.5, r: "legendary" },
            { n: "Shark", v: 2, r: "legendary" },
            { n: "T-Rex", v: 2.8, r: "legendary" },

            // EXOTIQUES / RARETÉS
            { n: "Cow", v: 16, r: "rare" }, // FIX: Stable Image
            { n: "African Wild Dog", v: 12.5, r: "ultra" },
            { n: "Pelican", v: 9.8, r: "ultra" },
            { n: "Caterpillar", v: 8.2, r: "ultra" },
            { n: "Mini Pig", v: 4.5, r: "ultra" },
            { n: "Goat", v: 6, r: "ultra" }
        ];

        let curSide = 'you', curSlot = 0, curMod = 'normal';
        let dataYou = Array(9).fill(0), dataThem = Array(9).fill(0);

        function showPage(id) {
            document.getElementById('home-page').style.display = (id === 'home-page') ? 'flex' : 'none';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'list-page') renderValueList();
        }

        // SYSTÈME D'IMAGES STABLE ET MULTI-SOURCE
        function getImgUrl(name) {
            const cleanName = name.toLowerCase().replace(/ /g, "_");
            const cdnName = name.toLowerCase().replace(/ /g, "");

            // Source CDN stable pour les images capricieuses (Cow, Cerberus, etc.)
            const stablePets = ["cow", "cerberus", "albinomonkey", "balloonunicorn", "unicorn", "giantpanda"];
            if (stablePets.includes(cdnName)) {
                return `https://vignette.wikia.nocookie.net/adoptme/images/a/a0/${name.replace(/ /g, "_")}.png/revision/latest?cb=1`;
            }

            // Source principale pour les autres pets
            return `https://www.adoptmevaluelist.com/assets/images/pets/${cleanName}.png`;
        }

        // Gestionnaire d'erreur pour les images Wiki capricieuses
        function handleImgError(img) {
            const name = img.alt;
            // Si la 1ère source échoue, on tente la 2ème source (AdoptMeValueList)
            if (!img.dataset.triedValueList) {
                img.dataset.triedValueList = "true";
                img.src = `https://www.adoptmevaluelist.com/assets/images/pets/${name.toLowerCase().replace(/ /g, "_")}.png`;
            } else {
                // Image par défaut si tout échoue
                img.src = `https://via.placeholder.com/100/ffe5ec/f72585?text=Pet`;
            }
        }

        function setMod(m) {
            curMod = m;
            document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('m-'+m).classList.add('selected');
        }

        function openPicker(side, slot) {
            curSide = side; curSlot = slot; setMod('normal');
            document.getElementById('picker').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('search').value = "";
            renderOptions();
        }

        function renderOptions() {
            const opt = document.getElementById('pet-options');
            opt.innerHTML = "";
            pets.sort((a,b) => b.v - a.v).forEach(p => {
                const img = getImgUrl(p.n);
                opt.innerHTML += `
                <div class="pet-option" onclick="selectPet('${p.n}', ${p.v}, '${img}')">
                    <img src="${img}" alt="${p.n}" onerror="handleImgError(this)">
                    <div style="flex:1">
                        <b style="font-size:1.1rem">${p.n}</b><br>
                        <span class="rarity-tag" style="background:var(--${p.r})">${p.r}</span>
                    </div>
                    <b style="color:var(--accent); font-size:1.2rem">${p.v}</b>
                </div>`;
            });
        }

        function selectPet(name, val, img) {
            let fVal = val; let label = "";
            if(curMod === 'neon') { fVal *= 4; label = "N"; }
            if(curMod === 'mega') { fVal *= 16; label = "M"; }
            if(document.getElementById('fly').checked) { fVal += 1.5; label += "F"; }
            if(document.getElementById('ride').checked) { fVal += 0.5; label += "R"; }
            
            const id = curSide === 'you' ? `sy-${curSlot}` : `st-${curSlot}`;
            document.getElementById(id).innerHTML = `
                <img src="${img}" alt="${name}" onerror="handleImgError(this)">
                <div class="slot-label">${label || 'Reg'}</div>`;
            
            if(curSide === 'you') dataYou[curSlot] = fVal; else dataThem[curSlot] = fVal;
            updateBar(); closePicker();
        }

        function updateBar() {
            const sY = dataYou.reduce((a,b)=>a+b,0), sT = dataThem.reduce((a,b)=>a+b,0);
            document.getElementById('v-you').innerText = sY.toFixed(1);
            document.getElementById('v-them').innerText = sT.toFixed(1);
            const total = sY + sT;
            const fill = document.getElementById('fill');
            fill.style.width = total === 0 ? "50%" : (sY / total * 100) + "%";
            
            const diff = sT - sY;
            const labels = ['l-win', 'l-fair', 'l-lose'];
            labels.forEach(l => document.getElementById(l).style.color = "#ddd");
            
            if(total > 0) {
                if(diff > 3) { document.getElementById('l-win').style.color = "#2ecc71"; document.getElementById('l-win').style.transform = "scale(1.2)"; }
                else if(diff < -3) { document.getElementById('l-lose').style.color = "#ff5e5e"; }
                else { document.getElementById('l-fair').style.color = "#f1c40f"; }
            }
        }

        function renderValueList() {
            const container = document.getElementById('full-list');
            container.innerHTML = "";
            pets.forEach(p => {
                const img = getImgUrl(p.n);
                container.innerHTML += `
                <div style="background:white; padding:20px; border-radius:30px; text-align:center; box-shadow:0 10px 20px rgba(0,0,0,0.05); border:1px solid #fff0f3;">
                    <img src="${img}" alt="${p.n}" style="width:75px; height:75px; object-fit:contain;" onerror="handleImgError(this)"><br>
                    <b style="display:block; margin:10px 0 5px 0; font-size:1.1rem;">${p.n}</b>
                    <span class="rarity-tag" style="background:var(--${p.r})">${p.r}</span><br>
                    <span style="color:var(--accent); font-weight:900; font-size:1.2rem;">${p.v}</span>
                </div>`;
            });
        }

        function filterPets() {
            const s = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.pet-option').forEach(o => {
                o.style.display = o.innerText.toLowerCase().includes(s) ? "flex" : "none";
            });
        }

        function closePicker() { document.getElementById('picker').style.display='none'; document.getElementById('overlay').style.display='none'; }
        
        function init() {
            const gy = document.getElementById('grid-you'), gt = document.getElementById('grid-them');
            for(let i=0; i<9; i++) {
                gy.innerHTML += `<div class="slot" onclick="openPicker('you', ${i})" id="sy-${i}">+</div>`;
                gt.innerHTML += `<div class="slot" onclick="openPicker('them', ${i})" id="st-${i}">+</div>`;
            }
        }
        init();
    </script>
</body>
</html>
