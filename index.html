<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairyValue 🧚 - Rose Edition Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff85a2; --accent: #f72585; --bg-rose: #ffe5ec; --slot-border: #ffb3c1;
            --leg: #ffac33; --ultra: #ff66cc; --rare: #33ccff; --uncommon: #66ff66;
        }

        body, html { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; min-height: 100vh; color: #333; background: #fff5f7; }

        /* --- ACCUEIL --- */
        #home-page {
            height: 100vh; background: linear-gradient(rgba(255, 133, 162, 0.4), rgba(0,0,0,0.6)), url('https://wallpapers.com/images/hd/adopt-me-background-r2fa0g7qap0177br.jpg');
            background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white;
        }

        .hero-title { font-size: 4rem; font-weight: 900; text-shadow: 0 5px 20px rgba(0,0,0,0.4); margin: 0; }
        .btn-container { display: flex; gap: 20px; margin-top: 30px; }
        .glass-btn { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 2px solid white; padding: 18px 40px; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .glass-btn:hover { background: white; color: var(--primary); transform: scale(1.05); }

        /* --- CALCULATEUR --- */
        .section { display: none; padding: 30px; }
        .active { display: block; }

        .elve-container { background: white; border-radius: 30px; padding: 25px; max-width: 550px; margin: 0 auto 30px; box-shadow: 0 15px 40px rgba(255,133,162,0.2); text-align: center; }
        .elve-bar { height: 14px; background: #f0f0f0; border-radius: 10px; margin: 20px 0; overflow: hidden; display: flex; border: 1px solid #eee; }
        #fill { height: 100%; width: 50%; background: linear-gradient(to right, #ff944d, #ff5e5e); transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); }

        .trade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; background: var(--bg-rose); padding: 18px; border-radius: 25px; border: 4px solid var(--slot-border); box-shadow: 0 8px 0 var(--slot-border); }
        .slot { width: 85px; height: 85px; background: white; border: 2px solid var(--slot-border); border-radius: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: 0.2s; }
        .slot:hover { transform: translateY(-3px); border-color: var(--accent); }
        .slot img { width: 85%; height: 85%; object-fit: contain; }

        /* --- PICKER --- */
        #picker { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; width:95%; max-width:500px; height:85vh; z-index:2000; border-radius:35px; padding:30px; box-shadow: 0 0 60px rgba(0,0,0,0.3); overflow-y: auto; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index:1999; }
        
        .rarity-tag { font-size: 0.7rem; font-weight: 900; padding: 3px 8px; border-radius: 5px; color: white; text-transform: uppercase; margin-top: 5px; display: inline-block; }
        .pet-option { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #fff0f3; cursor: pointer; transition: 0.2s; }
        .pet-option:hover { background: #fff0f3; border-radius: 15px; }
        .pet-option img { width: 65px; height: 65px; object-fit: contain; margin-right: 20px; }

        .modifier-row { display: flex; justify-content: space-around; background: #fdf0f3; padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        .mod-btn { cursor: pointer; padding: 8px 15px; border-radius: 12px; border: 2px solid #ffccd5; background: white; font-weight: bold; font-size: 0.9rem; }
        .mod-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }
    </style>
</head>
<body>

    <div id="home-page">
        <h1 class="hero-title">FAIRYVALUE 🧚</h1>
        <div class="btn-container">
            <button class="glass-btn" onclick="showPage('list-page')">VALUE LIST 📈📉</button>
            <button class="glass-btn" onclick="showPage('calc-page')">WFL CALCULATOR ✨</button>
        </div>
    </div>

    <div id="calc-page" class="section">
        <button onclick="showPage('home-page')" style="background:none; border:none; color:var(--accent); font-weight:900; cursor:pointer; font-size:1.1rem;">← BACK</button>
        
        <div class="elve-container">
            <div style="display:flex; justify-content:center; gap:30px; font-weight:900; color:#ddd; letter-spacing:2px;">
                <span id="l-win">WIN</span> <span id="l-fair">FAIR</span> <span id="l-lose">LOSE</span>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:3rem; font-weight:900; margin:15px 0;">
                <span id="v-you">0</span> <span id="v-them" style="color:#ff5e5e">0</span>
            </div>
            <div class="elve-bar"><div id="fill"></div></div>
        </div>

        <div style="display:flex; justify-content:center; gap:30px; flex-wrap:wrap;">
            <div class="trade-grid" id="grid-you"></div>
            <div class="trade-grid" id="grid-them"></div>
        </div>
    </div>

    <div id="list-page" class="section">
        <button onclick="showPage('home-page')" style="background:none; border:none; color:var(--accent); font-weight:900; cursor:pointer;">← BACK</button>
        <h2 style="text-align:center; color:var(--accent); font-size:2rem;">PET VALUES 📊</h2>
        <div id="full-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap:20px; padding:20px;"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closePicker()"></div>
    <div id="picker">
        <div class="modifier-row">
            <div class="mod-btn" id="m-normal" onclick="setMod('normal')">Normal</div>
            <div class="mod-btn" id="m-neon" onclick="setMod('neon')">Neon</div>
            <div class="mod-btn" id="m-mega" onclick="setMod('mega')">Mega</div>
        </div>
        <div class="modifier-row" style="margin-top:-10px;">
            <label style="font-weight:bold;"><input type="checkbox" id="fly"> Fly (F)</label>
            <label style="font-weight:bold;"><input type="checkbox" id="ride"> Ride (R)</label>
        </div>
        <input type="text" id="search" placeholder="Search a pet..." onkeyup="filterPets()" style="width:100%; padding:15px; border-radius:15px; border:2px solid #ffe5ec; margin-bottom:20px; outline:none;">
        <div id="pet-options"></div>
    </div>

    <script>
        const pets = [
            // LEGENDAIRES
            { n: "Shadow Dragon", v: 1000, i: "Shadow_Dragon.png", r: "legendary" },
            { n: "Bat Dragon", v: 865, i: "Bat_Dragon.png", r: "legendary" },
            { n: "Giraffe", v: 520, i: "Giraffe.png", r: "legendary" },
            { n: "Frost Dragon", v: 415, i: "Frost_Dragon.png", r: "legendary" },
            { n: "Owl", v: 265, i: "Owl.png", r: "legendary" },
            { n: "Parrot", v: 215, i: "Parrot.png", r: "legendary" },
            { n: "Crow", v: 155, i: "Crow.png", r: "legendary" },
            { n: "Evil Unicorn", v: 165, i: "Evil_Unicorn.png", r: "legendary" },
            { n: "Turtle", v: 21, i: "Turtle.png", r: "legendary" },
            { n: "Kangaroo", v: 18, i: "Kangaroo.png", r: "legendary" },
            { n: "SSBD", v: 13, i: "Strawberry_Shortcake_Bat_Dragon.png", r: "legendary" },
            // ULTRA-RARE
            { n: "Dalmatian", v: 14, i: "Dalmatian.png", r: "ultra" },
            { n: "Flamingo", v: 12, i: "Flamingo.png", r: "ultra" },
            { n: "Lion", v: 9.5, i: "Lion.png", r: "ultra" },
            { n: "Puffin", v: 3.5, i: "Puffin.png", r: "ultra" },
            // RARE
            { n: "Cow", v: 16.5, i: "Cow.png", r: "rare" },
            { n: "Elephant", v: 9, i: "Elephant.png", r: "rare" },
            { n: "Hyena", v: 6.5, i: "Hyena.png", r: "rare" },
            { n: "Shrew", v: 4.5, i: "Shrew.png", r: "rare" },
            // UNCOMMON
            { n: "Pink Cat", v: 6, i: "Pink_Cat.png", r: "uncommon" },
            { n: "Blue Dog", v: 10, i: "Blue_Dog.png", r: "uncommon" },
            // EGGS
            { n: "Pink Egg", v: 110, i: "Pink_Egg.png", r: "rare" },
            { n: "Blue Egg", v: 130, i: "Blue_Egg.png", r: "rare" },
            { n: "Safari Egg", v: 95, i: "Safari_Egg.png", r: "legendary" },
            { n: "Jungle Egg", v: 60, i: "Jungle_Egg.png", r: "legendary" },
            { n: "Farm Egg", v: 35, i: "Farm_Egg.png", r: "legendary" }
        ];

        let curSide = 'you', curSlot = 0, curMod = 'normal';
        let dataYou = Array(9).fill(0), dataThem = Array(9).fill(0);

        function showPage(id) {
            document.getElementById('home-page').style.display = (id === 'home-page') ? 'flex' : 'none';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'list-page') renderValueList();
        }

        function setMod(m) {
            curMod = m;
            document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('m-'+m).classList.add('selected');
        }

        function openPicker(side, slot) {
            curSide = side; curSlot = slot; setMod('normal');
            document.getElementById('fly').checked = false;
            document.getElementById('ride').checked = false;
            document.getElementById('picker').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            renderOptions();
        }

        function renderOptions() {
            const opt = document.getElementById('pet-options');
            opt.innerHTML = "";
            pets.sort((a,b) => b.v - a.v).forEach(p => {
                const img = `https://adoptme.fandom.com/wiki/Special:FilePath/${p.i}?width=150`;
                opt.innerHTML += `<div class="pet-option" onclick="selectPet('${p.n}', ${p.v}, '${img}')">
                    <img src="${img}">
                    <div>
                        <b style="font-size:1.1rem">${p.n}</b><br>
                        <span class="rarity-tag" style="background:var(--${p.r})">${p.r}</span>
                    </div>
                    <b style="margin-left:auto; color:var(--accent)">${p.v}</b>
                </div>`;
            });
        }

        function selectPet(name, val, img) {
            let finalVal = val;
            let label = "";
            if(curMod === 'neon') { finalVal *= 4; label = "N"; }
            if(curMod === 'mega') { finalVal *= 16; label = "M"; }
            if(document.getElementById('fly').checked) { finalVal += 1.5; label += "F"; }
            if(document.getElementById('ride').checked) { finalVal += 0.5; label += "R"; }

            const id = curSide === 'you' ? `sy-${curSlot}` : `st-${curSlot}`;
            document.getElementById(id).innerHTML = `<img src="${img}"><div style="position:absolute; bottom:5px; background:white; padding:2px 5px; border-radius:5px; font-weight:900; font-size:0.6rem; border:1px solid #ffb3c1;">${label || 'Reg'}</div>`;
            
            if(curSide === 'you') dataYou[curSlot] = finalVal; else dataThem[curSlot] = finalVal;
            updateBar(); closePicker();
        }

        function updateBar() {
            const sY = dataYou.reduce((a,b)=>a+b,0), sT = dataThem.reduce((a,b)=>a+b,0);
            document.getElementById('v-you').innerText = sY.toFixed(1);
            document.getElementById('v-them').innerText = sT.toFixed(1);
            const total = sY + sT;
            document.getElementById('fill').style.width = total === 0 ? "50%" : (sY / total * 100) + "%";
            const diff = sT - sY;
            ['l-win', 'l-fair', 'l-lose'].forEach(l => document.getElementById(l).style.color = "#ddd");
            if(total > 0) {
                if(diff > 5) document.getElementById('l-win').style.color = "#2ecc71";
                else if(diff < -5) document.getElementById('l-lose').style.color = "#ff5e5e";
                else document.getElementById('l-fair').style.color = "#f1c40f";
            }
        }

        function renderValueList() {
            const container = document.getElementById('full-list');
            container.innerHTML = "";
            pets.forEach(p => {
                const img = `https://adoptme.fandom.com/wiki/Special:FilePath/${p.i}?width=200`;
                container.innerHTML += `<div style="background:white; padding:20px; border-radius:25px; text-align:center; box-shadow:0 5px 15px rgba(0,0,0,0.05);">
                    <img src="${img}" style="width:80px; height:80px; object-fit:contain;"><br>
                    <b style="font-size:0.9rem;">${p.n}</b><br>
                    <span class="rarity-tag" style="background:var(--${p.r})">${p.r}</span><br>
                    <span style="color:var(--accent); font-weight:900; font-size:1.2rem;">${p.v}</span>
                </div>`;
            });
        }

        function filterPets() {
            const s = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.pet-option').forEach(o => {
                o.style.display = o.innerText.toLowerCase().includes(s) ? "flex" : "none";
            });
        }

        function closePicker() { document.getElementById('picker').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
        function init() {
            const gy = document.getElementById('grid-you'), gt = document.getElementById('grid-them');
            for(let i=0; i<9; i++) {
                gy.innerHTML += `<div class="slot" onclick="openPicker('you', ${i})" id="sy-${i}"><span style="color:#ffb3c1; font-size:2rem; font-weight:900;">+</span></div>`;
                gt.innerHTML += `<div class="slot" onclick="openPicker('them', ${i})" id="st-${i}"><span style="color:#ffb3c1; font-size:2rem; font-weight:900;">+</span></div>`;
            }
        }
        init();
    </script>
</body>
</html>
