<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairyValue ✨ Mega Pet Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;900&family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --kawaii-pink: #ffc2d1; --kawaii-purple: #e2afff; --accent: #fb6f92;
            --soft-white: #fff5f7; --leg-color: #ffcc33; --ultra-color: #f72585;
            --rare-color: #4cc9f0;
        }
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Outfit', sans-serif; 
            background: var(--soft-white); color: #444; overflow-x: hidden;
            height: 100%;
        }

        #home-page { 
            height: 100vh;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQcikgsQCWAVlyiYGUpZf6Qk19CSL7a4ZOjk32oPCFqwg&s=10');
            background-repeat: repeat; background-size: 200px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        #home-page::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2); z-index: 1;
        }

        .hero-title { 
            font-family: 'Bubblegum Sans', cursive; font-size: clamp(3.5rem, 15vw, 6.5rem); 
            color: white; margin: 0; z-index: 2;
            filter: drop-shadow(0 10px 15px rgba(251,111,146,0.6)); 
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .glass-btn { 
            background: white; border: 4px solid var(--kawaii-pink); padding: 18px 45px; border-radius: 50px; 
            color: var(--accent); font-weight: 900; cursor: pointer; margin: 15px; 
            box-shadow: 0 10px 25px rgba(251,111,146,0.3); transition: 0.4s; 
            font-size: 1.2rem; z-index: 2; text-transform: uppercase;
        }
        .glass-btn:hover { transform: scale(1.1); background: var(--accent); color: white; }

        .section { display: none; padding: 20px; animation: fadeIn 0.5s ease; }
        .active { display: block; }

        .container { 
            background: white; border-radius: 40px; padding: 25px; max-width: 600px; 
            margin: 0 auto 25px; text-align: center; border: 4px solid var(--kawaii-pink);
        }

        .trade-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            background: #fff; padding: 12px; border-radius: 30px; border: 4px solid #ffe5ec;
        }

        .slot { 
            width: 85px; height: 85px; background: #fffcfd; border: 3px dashed var(--kawaii-pink); 
            border-radius: 25px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; position: relative; font-size: 1.5rem; color: var(--kawaii-pink);
        }
        .slot img { width: 80%; height: 80%; object-fit: contain; }

        .remove-btn { 
            position: absolute; top: -5px; right: -5px; background: var(--accent); 
            color: white; border-radius: 50%; width: 22px; height: 22px; 
            display: flex; align-items: center; justify-content: center; font-size: 12px; 
            border: 2px solid white; z-index: 10;
        }

        .slot-tag { 
            position: absolute; bottom: 5px; right: 5px; font-size: 0.6rem; 
            background: var(--kawaii-purple); color: white; padding: 2px 5px; border-radius: 5px;
        }

        #picker { 
            display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); 
            background:white; width:95%; max-width: 500px; height:80vh; z-index:3000; 
            border-radius:40px; padding:20px; flex-direction: column; border: 5px solid var(--kawaii-pink);
        }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(251,111,146,0.3); z-index:2999; }
        
        .m-btn { flex: 1; padding: 8px; border-radius: 12px; border: 2px solid #ffe5ec; background: white; font-weight: 900; cursor: pointer; color: var(--accent); font-size: 0.8rem; }
        .m-btn.active { background: var(--accent); color: white; }

        .pet-choice { display: flex; align-items: center; gap: 12px; padding: 8px; background: #fffafa; border-radius: 15px; margin-bottom: 5px; cursor: pointer; border: 2px solid transparent; }
        .pet-choice:hover { border-color: var(--kawaii-pink); background: white; }

        .pet-card { background: white; border-radius: 20px; padding: 10px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; }
        .rarity-leg { border-bottom: 5px solid var(--leg-color); }
        .rarity-ultra { border-bottom: 5px solid var(--ultra-color); }
        .rarity-rare { border-bottom: 5px solid var(--rare-color); }

        .trend-icon { font-size: 0.7rem; margin-left: 3px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <audio id="sound-pop" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="sound-win" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

    <div id="home-page">
        <h1 class="hero-title">FairyValue ✨</h1>
        <div style="z-index: 5;">
            <button class="glass-btn" onclick="playSound('pop'); showPage('list-page')">Value List 🎀</button>
            <button class="glass-btn" onclick="playSound('pop'); showPage('calc-page')">Calculator 🍭</button>
        </div>
    </div>

    <div id="calc-page" class="section">
        <button onclick="playSound('pop'); showPage('home-page')" style="border:none; background:none; color:var(--accent); font-weight:900; cursor:pointer;">🎀 Back</button>
        <div class="container">
            <div style="display:flex; justify-content:space-around;">
                <div><small>YOU</small><div id="v-you" style="font-size:2rem; font-weight:900;">0</div></div>
                <div id="profit-text" style="font-size: 1.5rem; color:var(--kawaii-pink)">VS</div>
                <div><small>THEM</small><div id="v-them" style="font-size:2rem; font-weight:900; color:var(--accent);">0</div></div>
            </div>
            <button onclick="playSound('pop'); resetTrade()" style="background:var(--kawaii-pink); border:none; padding:8px 15px; border-radius:15px; color:white; font-weight:900; cursor:pointer; margin-top:10px;">Clear</button>
        </div>
        <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
            <div id="grid-you" class="trade-grid"></div>
            <div id="grid-them" class="trade-grid"></div>
        </div>
    </div>

    <div id="list-page" class="section">
        <button onclick="playSound('pop'); showPage('home-page')" style="border:none; background:none; color:var(--accent); font-weight:900; cursor:pointer;">🎀 Back</button>
        <h2 style="text-align:center; color:var(--accent);">Mega Value List ✨</h2>
        <div id="full-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap:10px;"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closePicker()"></div>
    <div id="picker">
        <div style="display:flex; gap:3px; margin-bottom:10px;">
            <button class="m-btn active" onclick="playSound('pop'); setM('reg', this)">REG</button>
            <button class="m-btn" onclick="playSound('pop'); setM('neon', this)">NEON</button>
            <button class="m-btn" onclick="playSound('pop'); setM('mega', this)">MEGA</button>
            <button class="m-btn" id="r-btn" onclick="playSound('pop'); toggleRF('R')">R</button>
            <button class="m-btn" id="f-btn" onclick="playSound('pop'); toggleRF('F')">F</button>
        </div>
        <input type="text" id="search" placeholder="Search..." onkeyup="filterPets()" style="width:100%; padding:10px; border-radius:15px; border:2px solid var(--kawaii-pink); margin-bottom:10px; outline:none;">
        <div id="pet-options" style="flex:1; overflow-y:auto;"></div>
    </div>

    <script>
        function playSound(type) {
            const sound = document.getElementById(type === 'pop' ? 'sound-pop' : 'sound-win');
            sound.currentTime = 0;
            sound.play().catch(e => {});
        }

        const pets = [
            // --- HIGH TIERS ---
            { n: "Shadow Dragon", v: 455, ov: 450, r: "leg" },
            { n: "Bat Dragon", v: 560, ov: 500, r: "leg" },
            { n: "Giraffe", v: 230, ov: 660, r: "leg" },
            { n: "Frost Dragon", v: 190, ov: 440, r: "leg" },
            { n: "Owl", v: 165, ov: 305, r: "leg" },
            { n: "Parrot", v: 135, ov: 250, r: "leg" },
            { n: "Evil Unicorn", v: 99, ov: 200, r: "leg" },
            { n: "Crow", v: 110, ov: 100, r: "leg" },

            // --- MID TIERS / POPULAR ---
            { n: "Arctic Reindeer", v: 42, ov: 65, r: "leg" },
            { n: "Albino Monkey", v: 18, ov: 50, r: "leg" },
            { n: "Turtle", v: 26, ov: 2, r: "leg" },
            { n: "Kangaroo", v: 22, ov: 32, r: "leg" },
            { n: "Cow", v: 27, ov: 35, r: "rare" },
            { n: "Strawberry Shortcake Bat Dragon", v: 24, ov: 33, r: "leg" },
            { n: "Blue Dog", v: 32, ov: 32, r: "uncommon" },
            { n: "Pink Cat", v: 20, ov: 16, r: "uncommon" },
            { n: "Dalmatian", v: 37, ov: 35, r: "ultra" },
            { n: "Flamingo", v: 20, ov: 30, r: "ultra" },
            { n: "Hedgehog", v: 50, ov: 58, r: "ultra" },
            { n: "Croc", v: 12, ov: 10, r: "ultra" },

            // --- EXOTICS (HIGH DEMAND) ---
            { n: "African Wild Dog", v: 85, ov: 60, r: "ultra" },
            { n: "Pelican", v: 15, ov: 55, r: "ultra" },
            { n: "Caterpillar", v: 7, ov: 3, r: "ultra" },
            { n: "Balloon Unicorn", v: 55, ov: 42, r: "leg" },
            { n: "Hot Doggie", v: 9, ov: 30, r: "ultra" },
            { n: "Puffin", v: 6, ov: 20, r: "ultra" },
            { n: "Tortuga de la Isla", v: 12, ov: 10, r: "leg" },
            { n: "Peppermint Penguin", v: 19, ov: 20, r: "ultra" },
            { n: "Jellyfish", v: 4, ov: 12, r: "ultra" },
            { n: "Many-Mackerel", v: 2, ov: 12, r: "ultra" },

            // --- CUTE / KAWAII / PREPPY ---
            { n: "Lion Cub", v: 6, ov: 10, r: "ultra" },
            { n: "Sugar Glider", v: 4, ov: 8, r: "leg" },
            { n: "Candy Hare", v: 8, ov: 8, r: "leg" },
            { n: "Mini Pig", v: 15, ov: 13, r: "rare" },
            { n: "Glormy Leo", v: 5, ov: 14, r: "leg" },
            { n: "Glormy Hound", v: 3, ov: 14, r: "leg" },
            { n: "Majestic Pony", v: 2, ov: 12, r: "leg" },
            { n: "Nessie", v: 10, ov: 10, r: "leg" },
            { n: "Goat", v: 5, ov: 10, r: "ultra" },
            { n: "Lamb", v: 7, ov: 6, r: "ultra" },
            { n: "Sheeep", v: 13, ov: 12, r: "ultra" },
            { n: "Alley Cat", v: 7, ov: 5, r: "ultra" },
            { n: "Bat 2020", v: 3, ov: 3.5, r: "uncommon" },
            
            // --- EGGS & SPECIAL ---
            { n: "Safari Egg", v: 100, ov: 115, r: "item" },
            { n: "Blue Egg", v: 40, ov: 100, r: "item" },
            { n: "Pink Egg", v: 20, ov: 85, r: "item" },
            { n: "Jungle Egg", v: 35, ov: 75, r: "item" },
            { n: "Farm Egg", v: 25, ov: 55, r: "item" },
            { n: "Christmas Egg", v: 45, ov: 45, r: "item" },
            { n: "Ride Potion", v: 2, ov: 2, r: "item" },
            { n: "Fly Potion", v: 3, ov: 3, r: "item" },
            { n: "Tombstone", v: 65, ov: 60, r: "item" },
            { n: "Balloon", v: 2, ov: 5, r: "item" },
            { n: "Cryptid", v: 65, ov: 55, r: "leg" }
        ];

        let curSide, curSlot, curM = 'reg', curR = false, curF = false;
        let dYou = Array(9).fill(0), dThem = Array(9).fill(0);

        function showPage(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('home-page').style.display = (id === 'home-page' ? 'flex' : 'none');
            document.getElementById(id).classList.add('active');
            if(id === 'list-page') renderList();
        }

        function toggleRF(type) {
            if(type === 'R') { curR = !curR; document.getElementById('r-btn').classList.toggle('active'); }
            if(type === 'F') { curF = !curF; document.getElementById('f-btn').classList.toggle('active'); }
        }

        function setM(m, btn) {
            curM = m; 
            document.querySelectorAll('.m-btn').forEach(b => { if(!b.id.includes('-btn')) b.classList.remove('active') }); 
            btn.classList.add('active'); renderOptions();
        }

        function openPicker(side, slot) {
            playSound('pop');
            curSide = side; curSlot = slot;
            document.getElementById('picker').style.display = 'flex';
            document.getElementById('overlay').style.display = 'block';
            renderOptions();
        }

        function renderOptions() {
            const container = document.getElementById('pet-options'); container.innerHTML = "";
            pets.forEach(p => {
                let val = p.v;
                if(p.r !== 'item') { if(curM === 'neon') val *= 4.5; if(curM === 'mega') val *= 18; }
                const img = `https://adoptme.fandom.com/wiki/Special:FilePath/${p.n.replace(/ /g, "_")}.png?width=100`;
                container.innerHTML += `<div class="pet-choice" onclick="selectPet('${p.n}', ${val}, '${img}')">
                    <img src="${img}" style="width:35px;" onerror="this.src='https://via.placeholder.com/35'">
                    <span style="flex:1; font-weight:600; font-size:0.85rem;">${p.n}</span><b>${val.toFixed(0)}</b>
                </div>`;
            });
        }

        function selectPet(n, v, img) {
            playSound('pop');
            const id = curSide === 'you' ? `sy-${curSlot}` : `st-${curSlot}`;
            let tag = curM.toUpperCase()[0];
            if(curR) tag += "R"; if(curF) tag += "F";
            document.getElementById(id).innerHTML = `<div class="remove-btn" onclick="removePet(event, '${curSide}', ${curSlot})">X</div><img src="${img}"><div class="slot-tag">${tag}</div>`;
            if(curSide === 'you') dYou[curSlot] = v; else dThem[curSlot] = v;
            updateValues(); closePicker();
        }

        function removePet(e, side, slot) {
            e.stopPropagation();
            playSound('pop');
            const id = side === 'you' ? `sy-${slot}` : `st-${slot}`;
            document.getElementById(id).innerHTML = "+";
            if(side === 'you') dYou[slot] = 0; else dThem[slot] = 0;
            updateValues();
        }

        function resetTrade() {
            dYou.fill(0); dThem.fill(0);
            document.querySelectorAll('.slot').forEach(s => s.innerHTML = "+");
            updateValues();
        }

        function updateValues() {
            const sY = dYou.reduce((a,b)=>a+b,0), sT = dThem.reduce((a,b)=>a+b,0);
            document.getElementById('v-you').innerText = sY.toFixed(0);
            document.getElementById('v-them').innerText = sT.toFixed(0);
            const p = document.getElementById('profit-text');
            if(sY === 0 && sT === 0) { p.innerText = "VS"; }
            else if(sT > sY * 1.08) { 
                if (p.innerText !== "WIN! 💖") { playSound('win'); confetti(); }
                p.innerText = "WIN! 💖"; 
            }
            else if(sT < sY * 0.92) { p.innerText = "LOSE... 🧊"; }
            else { p.innerText = "FAIR! ✨"; }
        }

        function renderList() {
            const cont = document.getElementById('full-list'); cont.innerHTML = "";
            [...pets].sort((a,b) => b.v - a.v).forEach(p => {
                const rClass = p.r === 'leg' ? 'rarity-leg' : (p.r === 'ultra' ? 'rarity-ultra' : (p.r === 'rare' ? 'rarity-rare' : ''));
                let trend = "";
                if(p.v > p.ov) trend = `<span class="trend-icon" style="color:#fb6f92">▲</span>`;
                else if(p.v < p.ov) trend = `<span class="trend-icon" style="color:#4cc9f0">▼</span>`;
                else trend = `<span class="trend-icon" style="color:#ccc">●</span>`;

                cont.innerHTML += `<div class="pet-card ${rClass}">
                    <img src="https://adoptme.fandom.com/wiki/Special:FilePath/${p.n.replace(/ /g, "_")}.png?width=100" style="width:50px;">
                    <div style="font-size:0.65rem; font-weight:900; height:20px; overflow:hidden;">${p.n}</div>
                    <div style="color:var(--accent); font-weight:900; font-size:0.85rem;">${p.v.toFixed(0)} ${trend}</div>
                </div>`;
            });
        }

        function closePicker() { document.getElementById('picker').style.display='none'; document.getElementById('overlay').style.display='none'; }
        function filterPets() {
            const val = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.pet-choice').forEach(el => { el.style.display = el.innerText.toLowerCase().includes(val) ? "flex" : "none"; });
        }

        function init() {
            const gy = document.getElementById('grid-you'), gt = document.getElementById('grid-them');
            for(let i=0; i<9; i++) {
                gy.innerHTML += `<div class="slot" id="sy-${i}" onclick="openPicker('you', ${i})">+</div>`;
                gt.innerHTML += `<div class="slot" id="st-${i}" onclick="openPicker('them', ${i})">+</div>`;
            }
        }
        init();
    </script>
</body>
</html>
