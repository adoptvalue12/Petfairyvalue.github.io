<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairyValue 🧚 - Pro Trading</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff85a2; --accent: #f72585; --bg-rose: #ffe5ec; --slot-border: #ffb3c1;
        }

        body, html { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; min-height: 100vh; color: #333; overflow-x: hidden; }

        /* --- ACCUEIL --- */
        #home-page {
            height: 100vh; background: linear-gradient(rgba(255, 133, 162, 0.3), rgba(0,0,0,0.5)), url('https://wallpapers.com/images/hd/adopt-me-background-r2fa0g7qap0177br.jpg');
            background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white;
        }

        .hero-title { font-size: 3.5rem; font-weight: 900; text-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .glass-btn { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 2px solid white; padding: 15px 30px; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .glass-btn:hover { background: white; color: var(--primary); transform: scale(1.05); }

        /* --- CALCULATEUR --- */
        .section { display: none; padding: 20px; min-height: 100vh; background: #fff5f7; }
        .active { display: block; }

        .elve-container { background: white; border-radius: 25px; padding: 20px; max-width: 500px; margin: 0 auto 20px; box-shadow: 0 10px 30px rgba(255,133,162,0.2); text-align: center; }
        .elve-bar { height: 12px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; display: flex; }
        #fill { height: 100%; width: 50%; background: linear-gradient(to right, #ff944d, #ff5e5e); transition: 0.5s; }

        .trade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: var(--bg-rose); padding: 15px; border-radius: 20px; border: 3px solid var(--slot-border); }
        .slot { width: 80px; height: 80px; background: white; border: 2px solid var(--slot-border); border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .slot img { width: 80%; height: 80%; object-fit: contain; }
        .pot-icons { position: absolute; bottom: 2px; right: 2px; display: flex; gap: 1px; }
        .pot-tag { width: 12px; height: 12px; border-radius: 50%; border: 1px solid white; }

        /* --- PICKER & OPTIONS --- */
        #picker { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; width:90%; max-width:450px; height:80vh; z-index:2000; border-radius:30px; padding:25px; box-shadow: 0 0 50px rgba(0,0,0,0.2); overflow-y: auto; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index:1999; }
        
        .modifier-box { background: #fdf0f3; padding: 15px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-around; font-weight: bold; font-size: 0.8rem; }
        .mod-btn { cursor: pointer; padding: 5px 10px; border-radius: 10px; border: 1px solid #ddd; background: white; }
        .mod-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }

        .pet-option { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .pet-option img { width: 50px; margin-right: 15px; }
    </style>
</head>
<body>

    <div id="home-page">
        <h1 class="hero-title">FAIRYVALUE 🧚</h1>
        <div class="btn-container">
            <button class="glass-btn" onclick="showPage('list-page')">VALUE LIST 📈📉</button>
            <button class="glass-btn" onclick="showPage('calc-page')">WFL CALCULATOR ✨</button>
        </div>
    </div>

    <div id="calc-page" class="section">
        <div onclick="showPage('home-page')" style="color:var(--accent); font-weight:bold; cursor:pointer;">← RETOUR</div>
        <div class="elve-container">
            <div style="display:flex; justify-content:center; gap:25px; font-weight:900; color:#ddd;">
                <span id="l-win">WIN</span> <span id="l-fair">FAIR</span> <span id="l-lose">LOSE</span>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:2.5rem; font-weight:900; margin:10px 0;">
                <span id="v-you">0</span> <span id="v-them" style="color:#ff5e5e">0</span>
            </div>
            <div class="elve-bar"><div id="fill"></div></div>
        </div>

        <div style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap;">
            <div class="trade-grid" id="grid-you"></div>
            <div class="trade-grid" id="grid-them"></div>
        </div>
    </div>

    <div id="list-page" class="section">
        <div onclick="showPage('home-page')" style="color:var(--accent); font-weight:bold; cursor:pointer;">← RETOUR</div>
        <h2 style="text-align:center;">VALUE LIST 📊</h2>
        <div id="full-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap:10px;"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closePicker()"></div>
    <div id="picker">
        <h3 style="color:var(--accent); margin-top:0;">1. Choisir le type 🧪</h3>
        <div class="modifier-box">
            <div class="mod-btn" id="m-normal" onclick="setMod('normal')">Normal</div>
            <div class="mod-btn" id="m-neon" onclick="setMod('neon')">Neon</div>
            <div class="mod-btn" id="m-mega" onclick="setMod('mega')">Mega</div>
        </div>
        <div class="modifier-box">
            <label><input type="checkbox" id="fly"> Fly (F)</label>
            <label><input type="checkbox" id="ride"> Ride (R)</label>
        </div>
        <h3 style="color:var(--accent)">2. Sélectionner le Pet 🐾</h3>
        <div id="pet-options"></div>
    </div>

    <script>
        const pets = [
            { n: "Shadow Dragon", v: 1000, i: "Shadow_Dragon.png" },
            { n: "Bat Dragon", v: 865, i: "Bat_Dragon.png" },
            { n: "Frost Dragon", v: 415, i: "Frost_Dragon.png" },
            { n: "Owl", v: 265, i: "Owl.png" },
            { n: "Turtle", v: 21, i: "Turtle.png" },
            { n: "Cow", v: 16.5, i: "Cow.png" }
        ];

        let curSide = 'you', curSlot = 0, curMod = 'normal';
        let dataYou = Array(9).fill(0), dataThem = Array(9).fill(0);

        function showPage(id) {
            document.getElementById('home-page').style.display = (id === 'home-page') ? 'flex' : 'none';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'list-page') renderValueList();
        }

        function setMod(m) {
            curMod = m;
            document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('m-'+m).classList.add('selected');
        }

        function openPicker(side, slot) {
            curSide = side; curSlot = slot; setMod('normal');
            document.getElementById('fly').checked = false;
            document.getElementById('ride').checked = false;
            document.getElementById('picker').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            renderOptions();
        }

        function renderOptions() {
            const opt = document.getElementById('pet-options');
            opt.innerHTML = "";
            pets.forEach(p => {
                const img = `https://adoptme.fandom.com/wiki/Special:FilePath/${p.i}?width=100`;
                opt.innerHTML += `<div class="pet-option" onclick="selectPet('${p.n}', ${p.v}, '${img}')">
                    <img src="${img}"> <b>${p.n}</b>
                </div>`;
            });
        }

        function selectPet(name, val, img) {
            let finalVal = val;
            let label = "";
            if(curMod === 'neon') { finalVal *= 4; label = "N"; }
            if(curMod === 'mega') { finalVal *= 16; label = "M"; }
            if(document.getElementById('fly').checked) { finalVal += 2; label += "F"; }
            if(document.getElementById('ride').checked) { finalVal += 1; label += "R"; }

            const id = curSide === 'you' ? `sy-${curSlot}` : `st-${curSlot}`;
            document.getElementById(id).innerHTML = `<img src="${img}"><div style="position:absolute; top:2px; left:5px; font-weight:900; font-size:0.7rem; color:var(--accent)">${label}</div>`;
            
            if(curSide === 'you') dataYou[curSlot] = finalVal; else dataThem[curSlot] = finalVal;
            updateBar(); closePicker();
        }

        function updateBar() {
            const sY = dataYou.reduce((a,b)=>a+b,0), sT = dataThem.reduce((a,b)=>a+b,0);
            document.getElementById('v-you').innerText = sY.toFixed(1);
            document.getElementById('v-them').innerText = sT.toFixed(1);
            const total = sY + sT;
            document.getElementById('fill').style.width = total === 0 ? "50%" : (sY / total * 100) + "%";
            const diff = sT - sY;
            const labels = ['l-win', 'l-fair', 'l-lose'];
            labels.forEach(l => document.getElementById(l).style.color = "#ddd");
            if(total > 0) {
                if(diff > 5) document.getElementById('l-win').style.color = "#2ecc71";
                else if(diff < -5) document.getElementById('l-lose').style.color = "#ff5e5e";
                else document.getElementById('l-fair').style.color = "#f1c40f";
            }
        }

        function renderValueList() {
            const container = document.getElementById('full-list');
            container.innerHTML = "";
            pets.forEach(p => {
                const img = `https://adoptme.fandom.com/wiki/Special:FilePath/${p.i}?width=100`;
                container.innerHTML += `<div style="background:white; padding:10px; border-radius:15px; text-align:center;">
                    <img src="${img}" style="width:60px;"><br><b>${p.n}</b><br><span style="color:var(--accent)">${p.v}</span>
                </div>`;
            });
        }

        function closePicker() { document.getElementById('picker').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
        function init() {
            const gy = document.getElementById('grid-you'), gt = document.getElementById('grid-them');
            for(let i=0; i<9; i++) {
                gy.innerHTML += `<div class="slot" onclick="openPicker('you', ${i})" id="sy-${i}">+</div>`;
                gt.innerHTML += `<div class="slot" onclick="openPicker('them', ${i})" id="st-${i}">+</div>`;
            }
        }
        init();
    </script>
</body>
</html>
