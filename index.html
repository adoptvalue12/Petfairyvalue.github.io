<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairyValue 🧚 - Database Alpha</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff85a2; --accent: #f72585; --bg-rose: #ffe5ec; --slot-border: #ffb3c1;
            --legendary: #ffac33; --ultra: #ff66cc; --rare: #33ccff; --uncommon: #66ff66; --common: #b3b3b3;
            --exotic: #9d4edd;
        }
        
        body, html { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; min-height: 100vh; background: #fff5f7; color: #333; overflow-x: hidden; }
        
        /* HOME */
        #home-page {
            height: 100vh; background: linear-gradient(rgba(255, 133, 162, 0.3), rgba(0,0,0,0.7)), url('https://wallpapers.com/images/hd/adopt-me-background-r2fa0g7qap0177br.jpg');
            background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 20px;
        }
        .hero-title { font-size: clamp(2.8rem, 15vw, 5.5rem); font-weight: 900; color: white; text-shadow: 0 0 25px var(--accent), 0 10px 10px rgba(0,0,0,0.5); animation: float 3s infinite; margin: 0; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .btn-container { display: flex; gap: 15px; margin-top: 40px; flex-wrap: wrap; justify-content: center; }
        .glass-btn { background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); border: 3px solid white; padding: 18px 30px; border-radius: 60px; color: white; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; }

        /* SECTIONS */
        .section { display: none; padding: 20px; animation: slideUp 0.4s ease; }
        .active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }

        /* CALCULATOR */
        .elve-container { background: white; border-radius: 35px; padding: 25px; max-width: 500px; margin: 0 auto 25px; box-shadow: 0 20px 50px rgba(247,37,133,0.15); text-align: center; }
        .trade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: white; padding: 15px; border-radius: 30px; border: 5px solid var(--bg-rose); }
        .slot { width: 85px; height: 85px; background: #fafafa; border: 2px solid #eee; border-radius: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .slot img { width: 80%; height: 80%; object-fit: contain; }
        .slot-label { position: absolute; bottom: 4px; right: 4px; font-size: 0.6rem; font-weight: 900; color: white; background: var(--accent); padding: 2px 5px; border-radius: 5px; }

        /* PICKER & TABS */
        #picker { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; width:90%; max-width: 550px; height:85vh; z-index:2000; border-radius:40px; padding:20px; box-shadow: 0 0 80px rgba(0,0,0,0.4); overflow: hidden; display:flex; flex-direction: column; }
        .tab-row { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 8px 15px; border-radius: 12px; border: none; background: #f0f0f0; font-weight: 900; font-size: 0.7rem; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--accent); color: white; }
        
        .mod-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .m-btn { flex: 1; padding: 10px; border-radius: 15px; border: 2px solid #eee; background: white; font-weight: 900; cursor: pointer; font-size: 0.75rem; }
        .m-btn.active { background: #333; color: white; border-color: #333; }

        #pet-options { flex: 1; overflow-y: auto; }
        .pet-choice { display: flex; align-items: center; gap: 15px; padding: 10px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .pet-choice img { width: 45px; height: 45px; object-fit: contain; }
        
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index:1999; }
    </style>
</head>
<body>

    <audio id="sound-pop" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <div id="home-page">
        <h1 class="hero-title">FAIRYVALUE 🧚</h1>
        <div class="btn-container">
            <button class="glass-btn" onclick="showPage('list-page')">VALEURS 📈</button>
            <button class="glass-btn" onclick="showPage('calc-page')">TRADES ✨</button>
        </div>
    </div>

    <div id="calc-page" class="section">
        <button onclick="showPage('home-page')" style="background:none; border:none; color:var(--accent); font-weight:900; cursor:pointer;">← RETOUR</button>
        <div class="elve-container">
            <div style="display:flex; justify-content:center; gap:30px; font-weight:900; color:#ccc;">WIN / FAIR / LOSE</div>
            <div style="display:flex; justify-content:space-between; font-size:3rem; font-weight:900; margin:10px 0;"><span id="v-you">0</span> <span id="v-them" style="color:var(--accent)">0</span></div>
            <div style="height:12px; background:#f0f0f0; border-radius:10px; overflow:hidden;"><div id="fill" style="height:100%; width:50%; background:var(--accent); transition:0.8s;"></div></div>
        </div>
        <div style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap;">
            <div class="trade-grid" id="grid-you"></div>
            <div class="trade-grid" id="grid-them"></div>
        </div>
    </div>

    <div id="list-page" class="section">
        <button onclick="showPage('home-page')" style="background:none; border:none; color:var(--accent); font-weight:900; cursor:pointer;">← RETOUR</button>
        <h2 style="text-align:center;">DATABASE 📊</h2>
        <div id="full-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap:15px;"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closePicker()"></div>
    <div id="picker">
        <div class="mod-row">
            <div class="m-btn active" id="b-reg" onclick="setM('reg')">REG</div>
            <div class="m-btn" id="b-neon" onclick="setM('neon')">NEON</div>
            <div class="m-btn" id="b-mega" onclick="setM('mega')">MEGA</div>
        </div>
        <div class="tab-row">
            <button class="tab-btn active" onclick="setTab('all', this)">TOUT</button>
            <button class="tab-btn" onclick="setTab('legendary', this)">LÉGENDAIRE</button>
            <button class="tab-btn" onclick="setTab('ultra', this)">ULTRA-RARE</button>
            <button class="tab-btn" onclick="setTab('rare', this)">RARE</button>
        </div>
        <input type="text" id="search" placeholder="Chercher..." onkeyup="filterPets()" style="width:100%; padding:12px; border-radius:15px; border:2px solid #eee; margin-bottom:10px; outline:none;">
        <div id="pet-options"></div>
    </div>

    <script>
        const pets = [
            // LEGENDARY
            { n: "Bat Dragon", v: 1000, r: "legendary" },
            { n: "Shadow Dragon", v: 850, r: "legendary" },
            { n: "Giraffe", v: 520, r: "legendary" },
            { n: "Frost Dragon", v: 415, r: "legendary" },
            { n: "Owl", v: 265, r: "legendary" },
            { n: "Parrot", v: 210, r: "legendary" },
            { n: "Evil Unicorn", v: 165, r: "legendary" },
            { n: "Crow", v: 155, r: "legendary" },
            { n: "Turtle", v: 42, r: "legendary" },
            { n: "Kangaroo", v: 32, r: "legendary" },
            // ULTRA RARE
            { n: "Hedgehog", v: 38.5, r: "ultra" },
            { n: "Dalmatian", v: 18.5, r: "ultra" },
            { n: "Flamingo", v: 16.5, r: "ultra" },
            { n: "Lion", v: 14.0, r: "ultra" },
            { n: "Cryptid", v: 12.0, r: "ultra", tag: "EXO" },
            { n: "Blue Dog", v: 28.0, r: "ultra" },
            // RARE
            { n: "Cow", v: 16.0, r: "rare" },
            { n: "Elephant", v: 12.0, r: "rare" },
            { n: "Hyena", v: 9.0, r: "rare" },
            { n: "Shrew", v: 8.5, r: "rare" },
            { n: "Pink Cat", v: 10.0, r: "rare" }
        ];

        let curSide, curSlot, curM = 'reg', curTab = 'all';
        let dYou = Array(9).fill(0), dThem = Array(9).fill(0);

        function setM(m) { curM = m; document.querySelectorAll('.m-btn').forEach(b=>b.classList.remove('active')); document.getElementById('b-'+m).classList.add('active'); }
        function setTab(t, btn) { curTab = t; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderOptions(); }

        function showPage(id) {
            document.getElementById('home-page').style.display = (id === 'home-page') ? 'flex' : 'none';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'list-page') renderList();
        }

        function openPicker(side, slot) {
            curSide = side; curSlot = slot; setM('reg');
            document.getElementById('picker').style.display = 'flex';
            document.getElementById('overlay').style.display = 'block';
            renderOptions();
        }

        function renderOptions() {
            const opt = document.getElementById('pet-options');
            opt.innerHTML = "";
            pets.filter(p => curTab === 'all' || p.r === curTab).forEach(p => {
                const img = `https://adoptme.fandom.com/wiki/Special:FilePath/${p.n.replace(/ /g, "_")}.png?width=100`;
                opt.innerHTML += `<div class="pet-choice" onclick="select('${p.n}', ${p.v}, '${img}')">
                    <img src="${img}" onerror="this.src='https://via.placeholder.com/45'">
                    <div style="flex:1"><b>${p.n}</b><br><small style="color:var(--${p.r})">${p.r.toUpperCase()}</small></div>
                    <b>${p.v}</b>
                </div>`;
            });
        }

        function select(n, v, img) {
            let fv = v; let l = "";
            if(curM === 'neon') { fv *= 4; l = "N"; }
            if(curM === 'mega') { fv *= 16; l = "M"; }
            const id = curSide === 'you' ? `sy-${curSlot}` : `st-${curSlot}`;
            document.getElementById(id).innerHTML = `<img src="${img}"><div class="slot-label">${l || 'REG'}</div>`;
            if(curSide === 'you') dYou[curSlot] = fv; else dThem[curSlot] = fv;
            update(); closePicker();
        }

        function update() {
            const sY = dYou.reduce((a,b)=>a+b,0), sT = dThem.reduce((a,b)=>a+b,0);
            document.getElementById('v-you').innerText = sY.toFixed(1);
            document.getElementById('v-them').innerText = sT.toFixed(1);
            document.getElementById('fill').style.width = (sY+sT === 0) ? "50%" : (sY/(sY+sT)*100) + "%";
        }

        function renderList() {
            const cont = document.getElementById('full-list');
            cont.innerHTML = "";
            pets.forEach(p => {
                cont.innerHTML += `<div style="background:white; padding:15px; border-radius:20px; text-align:center;">
                    <img src="https://adoptme.fandom.com/wiki/Special:FilePath/${p.n.replace(/ /g, "_")}.png?width=100" style="width:70px;">
                    <div style="font-weight:900; font-size:0.8rem;">${p.n}</div>
                    <div style="color:var(--accent); font-weight:900;">${p.v}</div>
                </div>`;
            });
        }

        function closePicker() { document.getElementById('picker').style.display='none'; document.getElementById('overlay').style.display='none'; }
        function filterPets() {
            const s = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.pet-choice').forEach(o => o.style.display = o.innerText.toLowerCase().includes(s) ? "flex" : "none");
        }

        function init() {
            for(let i=0; i<9; i++) {
                document.getElementById('grid-you').innerHTML += `<div class="slot" onclick="openPicker('you', ${i})" id="sy-${i}">+</div>`;
                document.getElementById('grid-them').innerHTML += `<div class="slot" onclick="openPicker('them', ${i})" id="st-${i}">+</div>`;
            }
        }
        init();
    </script>
</body>
</html>
