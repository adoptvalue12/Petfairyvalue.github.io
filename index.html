<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairyValue | Elvebredd Bar Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --game-bg: #c1f2d0;
            --slot-border: #6bbd8a;
            --elve-bg: #f9f6f0; /* Couleur crème de ta photo */
            --elve-red: #ff5e5e;
            --elve-dark: #4a4a4a;
        }

        body { font-family: 'Outfit', sans-serif; background: #f0fdf4; margin: 0; padding: 20px; }

        /* --- LA BARRE ELVEBREDD (TA PHOTO) --- */
        .elve-bar-container {
            background: var(--elve-bg);
            border-radius: 50px;
            padding: 20px 40px;
            max-width: 600px;
            margin: 20px auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
        }

        .bar-labels {
            display: flex; justify-content: center; gap: 15px;
            font-weight: 900; color: #ccc; text-transform: uppercase; margin-bottom: 10px;
        }
        .active-win { color: #4caf50; }
        .active-fair { color: #ffc107; }
        .active-lose { color: var(--elve-red); }

        .bar-stats {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 2.5rem; font-weight: 900; color: var(--elve-dark);
        }

        .offer-text { font-size: 0.8rem; color: #888; font-weight: bold; margin-top: -5px; }

        /* La ligne de progression */
        .progress-bg {
            height: 8px; background: #eee; border-radius: 10px;
            margin: 15px 0; overflow: hidden; display: flex;
        }
        #progress-fill {
            height: 100%; width: 50%; background: linear-gradient(to right, #ff944d, #ff5e5e);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- GRILLES DE TRADE --- */
        .trade-ui { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .grid-9 {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            background: var(--game-bg); padding: 15px; border-radius: 15px;
        }
        .slot {
            width: 70px; height: 70px; background: #e8f7ed;
            border: 2px solid var(--slot-border); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .slot img { width: 85%; height: 85%; object-fit: contain; }

        /* --- LISTE DES PETS --- */
        .pet-list {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px; max-width: 900px; margin: 30px auto;
        }
        .pet-card {
            background: white; border-radius: 15px; padding: 10px;
            text-align: center; border: 1px solid #eee; cursor: pointer; transition: 0.2s;
        }
        .pet-card:hover { transform: scale(1.05); border-color: #bc13fe; }
        .pet-card img { width: 60px; height: 60px; }
    </style>
</head>
<body>

    <h1 style="text-align:center; color:#bc13fe;">FAIRYVALUE 🧚</h1>

    <div class="elve-bar-container">
        <div class="bar-labels">
            <span id="label-win">WIN</span>
            <span id="label-fair">FAIR</span>
            <span id="label-lose">LOSE</span>
        </div>
        
        <div class="bar-stats">
            <div id="numYou">0</div>
            <div style="font-size: 1rem; color:#ddd;">|</div>
            <div id="numThem" style="color:var(--elve-red)">0</div>
        </div>
        
        <div style="display:flex; justify-content:space-between; margin-top:-10px;">
            <div class="offer-text">YOUR OFFER</div>
            <div class="offer-text">THEIR OFFER</div>
        </div>

        <div class="progress-bg">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div class="trade-ui">
        <div class="grid-9" id="gridYou"></div>
        <div style="display:flex; flex-direction:column; gap:10px; justify-content:center;">
             <select id="side" style="padding:10px; border-radius:10px; border:1px solid #ccc;">
                <option value="you">Add to You</option>
                <option value="them">Add to Them</option>
             </select>
             <button onclick="location.reload()" style="background:#ff5e5e; color:white; border:none; padding:10px; border-radius:10px; cursor:pointer;">Reset</button>
        </div>
        <div class="grid-9" id="gridThem"></div>
    </div>

    <div class="pet-list" id="petList"></div>

    <script>
        const pets = [
            { n: "Shadow Dragon", v: 1000, i: "Shadow_Dragon.png" },
            { n: "Bat Dragon", v: 865, i: "Bat_Dragon.png" },
            { n: "Giraffe", v: 520, i: "Giraffe.png" },
            { n: "Frost Dragon", v: 415, i: "Frost_Dragon.png" },
            { n: "Owl", v: 265, i: "Owl.png" },
            { n: "Parrot", v: 215, i: "Parrot.png" },
            { n: "Evil Unicorn", v: 165, i: "Evil_Unicorn.png" },
            { n: "Crow", v: 155, i: "Crow.png" },
            { n: "Turtle", v: 21, i: "Turtle.png" },
            { n: "Cow", v: 16.5, i: "Cow.png" }
        ];

        let youVal = 0; let themVal = 0;
        let youItems = []; let themItems = [];

        function init() {
            const gy = document.getElementById('gridYou');
            const gt = document.getElementById('gridThem');
            for(let i=0; i<9; i++) {
                gy.innerHTML += `<div class="slot" id="y${i}"></div>`;
                gt.innerHTML += `<div class="slot" id="t${i}"></div>`;
            }
            
            const list = document.getElementById('petList');
            pets.forEach(p => {
                const img = `https://adoptme.fandom.com/wiki/Special:FilePath/${p.i}?width=100`;
                list.innerHTML += `
                    <div class="pet-card" onclick="add('${p.n}', ${p.v}, '${img}')">
                        <img src="${img}">
                        <div style="font-weight:bold; font-size:0.8rem;">${p.n}</div>
                        <div style="color:#bc13fe; font-weight:900;">${p.v}</div>
                    </div>`;
            });
        }

        function add(name, val, img) {
            const side = document.getElementById('side').value;
            if(side === 'you' && youItems.length < 9) {
                document.getElementById(`y${youItems.length}`).innerHTML = `<img src="${img}">`;
                youItems.push(val); youVal += val;
            } else if (side === 'them' && themItems.length < 9) {
                document.getElementById(`t${themItems.length}`).innerHTML = `<img src="${img}">`;
                themItems.push(val); themVal += val;
            }
            updateBar();
        }

        function updateBar() {
            document.getElementById('numYou').innerText = youVal.toFixed(1);
            document.getElementById('numThem').innerText = themVal.toFixed(1);

            // Calcul de la barre (Ratio entre les deux)
            const total = youVal + themVal;
            const percentage = total === 0 ? 50 : (youVal / total) * 100;
            document.getElementById('progress-fill').style.width = percentage + "%";

            // Update des labels WIN/FAIR/LOSE
            const diff = themVal - youVal;
            const labels = ["label-win", "label-fair", "label-lose"];
            labels.forEach(l => document.getElementById(l).className = "");

            if (total === 0) return;
            if (diff > 5) document.getElementById('label-win').className = "active-win";
            else if (diff < -5) document.getElementById('label-lose').className = "active-lose";
            else document.getElementById('label-fair').className = "active-fair";
        }

        init();
    </script>
</body>
</html>
