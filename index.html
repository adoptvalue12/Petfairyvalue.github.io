<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairyValue 🧚 - Adopt Me Trading</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff; --accent: #bc13fe; --glass: rgba(255, 255, 255, 0.15);
            --win: #2ecc71; --loss: #e74c3c; --fair: #f1c40f;
        }

        body, html { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; height: 100%; color: white; overflow-x: hidden; }

        /* --- ACCUEIL STYLE AMVGG --- */
        #home-page {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://r2.erisy.ai/service-image/3378.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        .hero-title { font-size: 3.5rem; font-weight: 900; text-shadow: 0 5px 15px rgba(0,0,0,0.5); margin: 0; }
        .hero-subtitle { font-size: 1.1rem; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; opacity: 0.9; }

        .btn-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .glass-btn {
            background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
            padding: 15px 35px; border-radius: 50px; color: white; font-weight: bold;
            cursor: pointer; transition: 0.3s; text-decoration: none; display: flex; align-items: center; gap: 10px;
        }
        .glass-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-3px); }
        .btn-blue { background: rgba(0, 210, 255, 0.6); }

        /* --- SECTION CALCULATEUR --- */
        .section { display: none; padding: 20px; min-height: 100vh; background: #f0fdf4; color: #333; }
        .active { display: block; }

        /* BARRE ELVEBREDD */
        .elve-container { background: #fdfaf5; border-radius: 30px; padding: 20px; max-width: 600px; margin: 0 auto 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); text-align: center; }
        .elve-bar { height: 10px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; display: flex; }
        #fill { height: 100%; width: 50%; background: linear-gradient(to right, #ff944d, #ff5e5e); transition: 0.5s; }

        /* GRILLE 9 CASES */
        .trade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #c1f2d0; padding: 12px; border-radius: 15px; }
        .slot { width: 75px; height: 75px; background: #e8f7ed; border: 2px solid #6bbd8a; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .slot img { width: 85%; height: 85%; object-fit: contain; }
        .btn-plus { font-size: 2rem; color: #4caf50; font-weight: bold; }

        /* POPUP SELECTION */
        #picker { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; width:90%; max-width:500px; height:70vh; z-index:2000; border-radius:20px; padding:20px; box-shadow: 0 0 50px rgba(0,0,0,0.3); overflow-y: auto; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1999; }

        .pet-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .pet-item:hover { background: #f9f9f9; }
        .pet-item img { width: 50px; margin-right: 15px; }
        .trend { font-size: 0.8rem; margin-left: auto; font-weight: bold; }

    </style>
</head>
<body>

    <div id="home-page">
        <h1 class="hero-title">FAIRYVALUE 🧚</h1>
        <p class="hero-subtitle">The most trusted Trading Companion</p>
        <div class="btn-container">
            <button class="glass-btn btn-blue" onclick="showPage('list-page')">VALUE LIST 📈📉</button>
            <button class="glass-btn" onclick="showPage('calc-page')">WFL CALCULATOR ✨</button>
        </div>
    </div>

    <div id="calc-page" class="section">
        <button onclick="showPage('home-page')" style="border:none; background:none; color:var(--accent); cursor:pointer; font-weight:bold;">← BACK</button>
        
        <div class="elve-container">
            <div style="display:flex; justify-content:center; gap:20px; font-weight:900; color:#ccc;">
                <span id="l-win">WIN</span> <span id="l-fair">FAIR</span> <span id="l-lose">LOSE</span>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:2rem; font-weight:900; margin:10px 0;">
                <span id="v-you">0</span> <span id="v-them" style="color:#ff5e5e">0</span>
            </div>
            <div class="elve-bar"><div id="fill"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-weight:bold; color:#888;">
                <span>YOUR OFFER</span> <span>THEIR OFFER</span>
            </div>
        </div>

        <div style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap;">
            <div class="trade-grid" id="grid-you"></div>
            <div class="trade-grid" id="grid-them"></div>
        </div>
        <center><button onclick="location.reload()" style="margin-top:20px; padding:10px 30px; border-radius:20px; border:none; background:#ff5e5e; color:white; font-weight:bold;">RESET TRADE</button></center>
    </div>

    <div class="overlay" id="overlay" onclick="closePicker()"></div>
    <div id="picker">
        <h3>Select a Pet 🐾</h3>
        <input type="text" id="search" placeholder="Search..." onkeyup="filterPets()" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:15px;">
        <div id="pet-options"></div>
    </div>

    <script>
        const pets = [
            { n: "Shadow Dragon", v: 1000, i: "Shadow_Dragon.png", t: "up" },
            { n: "Bat Dragon", v: 865, i: "Bat_Dragon.png", t: "stable" },
            { n: "Giraffe", v: 520, i: "Giraffe.png", t: "down" },
            { n: "Frost Dragon", v: 415, i: "Frost_Dragon.png", t: "up" },
            { n: "Owl", v: 265, i: "Owl.png", t: "up" },
            { n: "Parrot", v: 215, i: "Parrot.png", t: "stable" },
            { n: "Evil Unicorn", v: 165, i: "Evil_Unicorn.png", t: "down" },
            { n: "Crow", v: 155, i: "Crow.png", t: "up" },
            { n: "Turtle", v: 21, i: "Turtle.png", t: "up" },
            { n: "Cow", v: 16.5, i: "Cow.png", t: "up" },
            { n: "SSBD", v: 13, i: "Strawberry_Shortcake_Bat_Dragon.png", t: "up" }
        ];

        let currentSide = 'you';
        let currentSlot = 0;
        let dataYou = Array(9).fill(0);
        let dataThem = Array(9).fill(0);

        function showPage(id) {
            document.getElementById('home-page').style.display = (id === 'home-page') ? 'flex' : 'none';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            if(id !== 'home-page') document.getElementById(id).classList.add('active');
        }

        function initGrids() {
            const gy = document.getElementById('grid-you');
            const gt = document.getElementById('grid-them');
            for(let i=0; i<9; i++) {
                gy.innerHTML += `<div class="slot" onclick="openPicker('you', ${i})" id="sy-${i}"><div class="btn-plus">+</div></div>`;
                gt.innerHTML += `<div class="slot" onclick="openPicker('them', ${i})" id="st-${i}"><div class="btn-plus">+</div></div>`;
            }
        }

        function openPicker(side, slot) {
            currentSide = side; currentSlot = slot;
            document.getElementById('picker').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            renderOptions();
        }

        function closePicker() {
            document.getElementById('picker').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function renderOptions() {
            const container = document.getElementById('pet-options');
            container.innerHTML = "";
            pets.forEach(p => {
                const trendIcon = p.t === 'up' ? '📈' : (p.t === 'down' ? '📉' : '➖');
                const trendColor = p.t === 'up' ? 'green' : (p.t === 'down' ? 'red' : 'gray');
                const img = `https://adoptme.fandom.com/wiki/Special:FilePath/${p.i}?width=100`;
                container.innerHTML += `
                    <div class="pet-item" onclick="selectPet('${p.n}', ${p.v}, '${img}')">
                        <img src="${img}">
                        <div><b>${p.n}</b><br><small>Value: ${p.v}</small></div>
                        <div class="trend" style="color:${trendColor}">${trendIcon}</div>
                    </div>`;
            });
        }

        function selectPet(name, val, img) {
            const id = currentSide === 'you' ? `sy-${currentSlot}` : `st-${currentSlot}`;
            document.getElementById(id).innerHTML = `<img src="${img}">`;
            if(currentSide === 'you') dataYou[currentSlot] = val; else dataThem[currentSlot] = val;
            updateBar();
            closePicker();
        }

        function updateBar() {
            const sumYou = dataYou.reduce((a, b) => a + b, 0);
            const sumThem = dataThem.reduce((a, b) => a + b, 0);
            document.getElementById('v-you').innerText = sumYou.toFixed(1);
            document.getElementById('v-them').innerText = sumThem.toFixed(1);

            const total = sumYou + sumThem;
            const perc = total === 0 ? 50 : (sumYou / total) * 100;
            document.getElementById('fill').style.width = perc + "%";

            const diff = sumThem - sumYou;
            const labels = ['l-win', 'l-fair', 'l-lose'];
            labels.forEach(l => document.getElementById(l).style.color = "#ccc");

            if(total > 0) {
                if(diff > 5) document.getElementById('l-win').style.color = "#2ecc71";
                else if(diff < -5) document.getElementById('l-lose').style.color = "#e74c3c";
                else document.getElementById('l-fair').style.color = "#f1c40f";
            }
        }

        initGrids();
    </script>
</body>
</html>
